name: Build iOS IPA

# ── Triggers ────────────────────────────────────────────────────────────────
# • Push to main/master that touches the app or this workflow → simulator build
# • Version tag (v*) + signing secrets present → signed IPA for real devices
# • workflow_dispatch → always runs
on:
  push:
    branches: [main, master]
    paths:
      - "inrjd_japa_session_tool_web-apk/**"
      - ".github/workflows/build-ios.yml"
    tags: ["v*"]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  APP_DIR: inrjd_japa_session_tool_web-apk

# ── Job ──────────────────────────────────────────────────────────────────────
jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-15
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── 2b. Ensure CocoaPods is available for iOS sync/build ───────────
      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods -N
          fi
          pod --version

      # ── 3. Install JS dependencies ───────────────────────────────────────
      - name: Install Node dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm install

      # ── 4. Generate image list ───────────────────────────────────────────
      - name: Generate image-list.json
        working-directory: ${{ env.APP_DIR }}
        run: node gen.js

      # ── 5. Ensure @capacitor/ios is installed ────────────────────────────
      - name: Ensure @capacitor/ios
        working-directory: ${{ env.APP_DIR }}
        run: npm install --no-save @capacitor/ios@^6.0.0

      # ── 6. Capacitor sync ────────────────────────────────────────────────
      - name: Capacitor sync (iOS)
        working-directory: ${{ env.APP_DIR }}
        run: |
          [ ! -d ios ] && npx cap add ios || true
          npx cap sync ios --no-open

          # Ensure CocoaPods dependencies are installed even if sync skips pods.
          if [ -d "ios/App" ]; then
            cd ios/App
            pod install --repo-update
          fi

      - name: Detect iOS signing secrets
        id: signing
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -n "$P12_BASE64" ]; then
            echo "has_p12=true" >> $GITHUB_OUTPUT
          else
            echo "has_p12=false" >> $GITHUB_OUTPUT
          fi

          if [ -n "$PROVISIONING_PROFILE_BASE64" ]; then
            echo "has_profile=true" >> $GITHUB_OUTPUT
          else
            echo "has_profile=false" >> $GITHUB_OUTPUT
          fi

      # ═══════════════════════════════════════════════════════════════════
      #  PATH A – SIGNED IPA for real iPhone devices
      #
      #  Requires these GitHub Secrets (Settings → Secrets → Actions):
      #    P12_BASE64                 base64-encoded .p12 signing certificate
      #    P12_PASSWORD               .p12 export password
      #    KEYCHAIN_PASSWORD          any temporary password for the CI keychain
      #    PROVISIONING_PROFILE_BASE64 base64-encoded .mobileprovision file
      #    PROVISIONING_PROFILE_UUID  UUID printed inside the .mobileprovision
      #    SIGNING_IDENTITY           e.g. "iPhone Distribution: Your Name (TEAMID)"
      #    APPLE_TEAM_ID              10-character Apple Team ID
      #    BUNDLE_ID                  (optional) overrides capacitor.config.json
      # ═══════════════════════════════════════════════════════════════════

      - name: Install Apple signing certificate
        if: ${{ steps.signing.outputs.has_p12 == 'true' }}
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          P12_PATH="$RUNNER_TEMP/certificate.p12"
          KC_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$P12_BASE64" | base64 --decode > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security import "$P12_PATH" \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security list-keychain -d user -s "$KC_PATH"

      - name: Install provisioning profile
        if: ${{ steps.signing.outputs.has_profile == 'true' }}
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build signed IPA (real device)
        id: signed_build
        if: ${{ steps.signing.outputs.has_p12 == 'true' && steps.signing.outputs.has_profile == 'true' }}
        working-directory: ${{ env.APP_DIR }}
        env:
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          PP_UUID: ${{ secrets.PROVISIONING_PROFILE_UUID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID="com.nrjd.japasession"
          fi

          # ── Archive ──────────────────────────────────────────────────
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/build/JapaSession.xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            archive

          # ── ExportOptions ────────────────────────────────────────────
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key>              <string>ad-hoc</string>
            <key>teamID</key>              <string>TEAM_ID_PLACEHOLDER</string>
            <key>compileBitcode</key>      <false/>
            <key>uploadSymbols</key>       <false/>
            <key>thinning</key>            <string>&lt;none&gt;</string>
          </dict></plist>
          PLIST
          sed -i '' "s/TEAM_ID_PLACEHOLDER/$TEAM_ID/" /tmp/ExportOptions.plist

          # ── Export IPA ───────────────────────────────────────────────
          xcodebuild \
            -exportArchive \
            -archivePath ios/build/JapaSession.xcarchive \
            -exportPath   ios/build/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

          SHA=$(git rev-parse --short HEAD)
          IPA=$(find ios/build/ipa -name "*.ipa" | head -1)
          DEST="japa-session-${SHA}.ipa"
          cp "$IPA" "$DEST"
          echo "artifact=$DEST" >> $GITHUB_OUTPUT

      # ═══════════════════════════════════════════════════════════════════
      #  PATH B – Simulator build fallback (no Apple signing needed)
      #  Produces a zipped .app bundle usable in Xcode Simulator.
      # ═══════════════════════════════════════════════════════════════════

      - name: Build simulator app (unsigned fallback)
        id: sim_build
        if: ${{ steps.signing.outputs.has_p12 != 'true' || steps.signing.outputs.has_profile != 'true' }}
        working-directory: ${{ env.APP_DIR }}
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP="ios/build/Build/Products/Release-iphonesimulator/App.app"
          if [ ! -d "$APP" ]; then echo "App.app not found"; exit 1; fi

          SHA=$(git rev-parse --short HEAD)
          ZIP="japa-session-ios-sim-${SHA}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          echo "artifact=$ZIP" >> $GITHUB_OUTPUT

      # ── 7. Upload artifact ───────────────────────────────────────────────
      - name: Upload IPA artifact
        if: steps.signed_build.outputs.artifact != ''
        uses: actions/upload-artifact@v4
        with:
          name: JapaSession-IPA
          path: ${{ env.APP_DIR }}/${{ steps.signed_build.outputs.artifact }}
          retention-days: 30

      - name: Upload simulator artifact
        if: steps.sim_build.outputs.artifact != ''
        uses: actions/upload-artifact@v4
        with:
          name: JapaSession-iOS-Simulator
          path: ${{ env.APP_DIR }}/${{ steps.sim_build.outputs.artifact }}
          retention-days: 30

      # ── 8. Attach to GitHub Release on version tag ───────────────────────
      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.signed_build.outputs.artifact != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APP_DIR }}/${{ steps.signed_build.outputs.artifact }}
          generate_release_notes: true

      # ── 9. Clean up signing keychain ─────────────────────────────────────
      - name: Delete temporary keychain
        if: ${{ always() && steps.signing.outputs.has_p12 == 'true' }}
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
