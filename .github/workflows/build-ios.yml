name: Build iOS App

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: inrjd_japa_session_tool_web-apk
        run: npm install

      - name: Generate image-list.json
        working-directory: inrjd_japa_session_tool_web-apk
        run: node gen.js

      - name: Capacitor sync iOS
        working-directory: inrjd_japa_session_tool_web-apk
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Build iOS app (unsigned simulator)
        working-directory: inrjd_japa_session_tool_web-apk
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package iOS app artifact
        working-directory: inrjd_japa_session_tool_web-apk
        run: |
          APP_PATH="ios/build/Build/Products/Release-iphonesimulator/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi

          SHA=$(echo "${{ github.sha }}" | head -c 7)
          ZIP_NAME="japa-session-ios-sim-${SHA}.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "IOS_ARTIFACT=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: JapaSession-iOS-Simulator
          path: inrjd_japa_session_tool_web-apk/${{ env.IOS_ARTIFACT }}
          retention-days: 30
