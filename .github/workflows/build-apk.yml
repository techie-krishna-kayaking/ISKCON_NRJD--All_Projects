name: Build APK

# ── Triggers ────────────────────────────────────────────────────────────────
# Runs on every push to main/master that touches the app or this workflow.
# Also triggered manually via Actions tab (workflow_dispatch).
# On a version tag push (v*) the APK is attached to a GitHub Release.
on:
  push:
    branches: [main, master]
    paths:
      - "inrjd_japa_session_tool_web-apk/**"
      - ".github/workflows/build-apk.yml"
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: false
        default: "debug"
        type: choice
        options: [debug, release]

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"
  APP_DIR: inrjd_japa_session_tool_web-apk

# ── Job ──────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ── 3. Java (required by Gradle) ─────────────────────────────────────
      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ── 4. Android SDK ───────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install JS dependencies ───────────────────────────────────────
      - name: Install Node dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm install

      # ── 6. Generate image list ───────────────────────────────────────────
      - name: Generate image-list.json
        working-directory: ${{ env.APP_DIR }}
        run: node gen.js

      # ── 7. Capacitor sync ────────────────────────────────────────────────
      - name: Capacitor sync (Android)
        working-directory: ${{ env.APP_DIR }}
        run: |
          [ ! -d android ] && npx cap add android || true
          npx cap sync android

      - name: Detect signing secrets
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          fi

      # ── 8a. Decode keystore (SIGNED RELEASE) ─────────────────────────────
      #   Requires these GitHub Secrets:
      #     KEYSTORE_BASE64    – base64 of the .jks / .keystore file
      #     KEYSTORE_PASSWORD  – store password
      #     KEY_ALIAS          – key alias inside the keystore
      #     KEY_PASSWORD       – key password
      - name: Decode keystore
        if: ${{ steps.signing.outputs.has_keystore == 'true' }}
        working-directory: ${{ env.APP_DIR }}/android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks

      # ── 8b. Build SIGNED Release APK ─────────────────────────────────────
      - name: Build Release APK (signed)
        if: ${{ steps.signing.outputs.has_keystore == 'true' }}
        working-directory: ${{ env.APP_DIR }}/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/release-key.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon --stacktrace

      # ── 8c. Build DEBUG APK (fallback when no keystore) ──────────────────
      - name: Build Debug APK (unsigned fallback)
        if: ${{ steps.signing.outputs.has_keystore != 'true' }}
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 9. Locate, label and expose the APK ──────────────────────────────
      - name: Locate APK
        id: apk
        run: |
          APK=$(find ${{ env.APP_DIR }}/android -name "*.apk" \
                  \( -path "*/release/*" -o -path "*/debug/*" \) | head -1)
          echo "Found: $APK"
          SHA=$(git rev-parse --short HEAD)
          BUILD=$(echo "$APK" | grep -q "release" && echo "release" || echo "debug")
          DEST="japa-session-${BUILD}-${SHA}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST"         >> $GITHUB_OUTPUT
          echo "build_type=$BUILD"  >> $GITHUB_OUTPUT

      # ── 10. Upload artifact ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JapaSession-APK-${{ steps.apk.outputs.build_type }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # ── 11. Attach to GitHub Release (only on tag push) ───────────────────
      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
