<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#fdf6ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Japa Counter</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Nunito:wght@300;400;500;600;700&family=Noto+Serif+Devanagari:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #fdf6ec;
        --saffron: #e07820;
        --marigold: #f0a830;
        --ink: #1e1008;
        --ink-soft: #70441b;
        --glass: rgba(253, 246, 236, 0.78);
        --glass-deep: rgba(249, 238, 218, 0.9);
        --glass-border: rgba(196, 130, 30, 0.22);
        --shadow: rgba(120, 60, 0, 0.18);
        --f-sacred: "Cinzel", Georgia, serif;
        --f-ui: "Nunito", "Segoe UI", sans-serif;
        --f-deva: "Noto Serif Devanagari", serif;
        --st: env(safe-area-inset-top, 0px);
        --sb: env(safe-area-inset-bottom, 0px);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      body {
        overflow: hidden;
        font-family: var(--f-ui);
        color: var(--ink);
        background: var(--cream);
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      button {
        font-family: var(--f-ui);
        border: none;
        background: none;
        color: inherit;
        cursor: pointer;
      }

      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(ellipse 70% 55% at 10% 6%, rgba(240, 168, 48, 0.24) 0%, transparent 62%),
          radial-gradient(ellipse 65% 48% at 92% 92%, rgba(224, 120, 32, 0.16) 0%, transparent 62%),
          linear-gradient(158deg, #fef9f1 0%, #faecd9 48%, #fdf3e4 100%);
      }

      #app {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        padding: calc(var(--st) + 10px) clamp(8px, 2vw, 16px) calc(
            var(--sb) + 70px
          );
      }

      #topbar {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      #device-time {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        min-width: 124px;
        text-align: center;
        font-family: var(--f-sacred);
        font-size: clamp(0.62rem, 1.6vw, 0.82rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #9a642f;
        background: rgba(255, 247, 233, 0.86);
        border: 1px solid var(--glass-border);
        border-radius: 999px;
        padding: 7px 14px;
        box-shadow: 0 4px 12px rgba(150, 90, 20, 0.08);
      }
      #brand {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #badge {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 3px 10px rgba(212, 134, 15, 0.25);
      }
      #brand-copy {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
      }
      #brand-name {
        font-family: var(--f-sacred);
        font-size: 0.58rem;
        font-weight: 700;
        color: #c57514;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      #brand-sub {
        font-size: 0.48rem;
        color: var(--ink-soft);
        letter-spacing: 0.06em;
      }

      /* ─────────────────────────────── TABS ─────────────────────────────── */
      #tabs-container {
        position: relative;
        height: 44px;
        margin-bottom: 10px;
        overflow: hidden;
        border-radius: 14px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        box-shadow: 0 4px 12px rgba(120, 60, 0, 0.1);
      }

      #tabs-wrapper {
        display: flex;
        height: 100%;
        transition: transform 0.3s ease;
        will-change: transform;
      }

      .tab {
        flex: 0 0 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.05em;
        color: #8f612f;
        white-space: nowrap;
        cursor: pointer;
        transition: color 0.2s ease;
      }

      .tab.active {
        color: #ffffff;
        background: linear-gradient(140deg, var(--saffron), var(--marigold));
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
      }

      #content {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      #slide-wrap {
        position: relative;
        height: clamp(100px, 20vh, 180px);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--glass-border);
        background: rgba(40, 26, 12, 0.08);
        box-shadow: 0 6px 18px rgba(90, 40, 6, 0.14);
      }
      .slide {
        position: absolute;
        inset: 0;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        opacity: 0;
        transition: opacity 1.6s ease;
      }
      .slide.active {
        opacity: 1;
      }
      #slide-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(253, 246, 236, 0.05) 0%,
          rgba(253, 246, 236, 0.4) 100%
        );
        pointer-events: none;
      }

      #mantra-box {
        text-align: center;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 10px 12px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6),
          0 4px 12px rgba(120, 60, 0, 0.09);
      }
      #mantra-title {
        font-family: var(--f-sacred);
        font-size: 0.62rem;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #cf7a19;
        margin-bottom: 4px;
      }
      #mantra-native {
        font-family: var(--f-deva);
        font-size: 0.74rem;
        line-height: 1.5;
        color: #5c3416;
      }
      #mantra-roman {
        margin-top: 4px;
        font-size: 0.64rem;
        line-height: 1.4;
        font-weight: 700;
        color: #7c4b21;
      }

      #counter-card {
        flex: 1;
        min-height: 0;
        border-radius: 16px;
        padding: 12px;
        border: 1px solid var(--glass-border);
        background: linear-gradient(
            150deg,
            rgba(255, 200, 120, 0.16) 0%,
            rgba(255, 240, 214, 0.04) 38%,
            rgba(255, 190, 110, 0.14) 100%
          ),
          var(--glass-deep);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55),
          0 10px 24px rgba(120, 60, 0, 0.12);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      #counter-label {
        font-family: var(--f-sacred);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #8f541f;
      }

      #count-circle {
        width: clamp(120px, 35vw, 160px);
        height: clamp(120px, 35vw, 160px);
        border-radius: 50%;
        border: 2px solid rgba(224, 120, 32, 0.32);
        background: radial-gradient(
            circle at 28% 22%,
            rgba(255, 255, 255, 0.74),
            rgba(255, 255, 255, 0) 32%
          ),
          linear-gradient(160deg, #fff7e8 0%, #f8e4bf 100%);
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.75),
          0 0 0 5px rgba(224, 120, 32, 0.1),
          0 10px 22px rgba(160, 85, 12, 0.18);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
      }
      #count-value {
        font-family: var(--f-sacred);
        font-size: clamp(1.8rem, 8vw, 2.8rem);
        font-weight: 900;
        letter-spacing: 0.04em;
        color: #7c4418;
        text-shadow: 0 1px 8px rgba(224, 120, 32, 0.16);
      }
      #count-caption {
        text-transform: uppercase;
        font-size: 0.42rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        color: #9a5f2d;
      }

      #round-row {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        width: 100%;
      }
      .stat-chip {
        background: rgba(255, 245, 226, 0.94);
        color: #8d5524;
        border: 1px solid rgba(196, 130, 30, 0.28);
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 0.62rem;
        letter-spacing: 0.04em;
        font-weight: 700;
        box-shadow: 0 3px 10px rgba(120, 60, 0, 0.07);
      }

      /* ─────────────────────────────── BUTTONS LAYOUT ─────────────────────────────── */
      #btns-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }

      /* Large + button takes priority */
      #plus-btn {
        width: clamp(80px, 28vw, 120px);
        height: clamp(80px, 28vw, 120px);
        border-radius: 50%;
        color: #fff6ea;
        border: 1px solid rgba(255, 245, 220, 0.5);
        background: radial-gradient(
            circle at 12% 18%,
            rgba(255, 255, 255, 0.48),
            transparent 42%
          ),
          linear-gradient(150deg, var(--saffron) 0%, var(--marigold) 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42),
          0 10px 26px rgba(180, 90, 14, 0.36),
          0 0 14px rgba(240, 168, 48, 0.24);
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 900;
        line-height: 1;
        transition: transform 0.1s ease, box-shadow 0.1s ease;
      }
      #plus-btn:active {
        transform: scale(0.92);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42),
          0 6px 16px rgba(180, 90, 14, 0.28);
      }

      /* Small minus and other buttons in a row */
      #controls-row {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .small-btn {
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(255, 245, 226, 0.93);
        color: #8d5524;
        border: 1px solid rgba(196, 130, 30, 0.24);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        box-shadow: 0 3px 10px rgba(120, 60, 0, 0.08);
        transition: transform 0.08s ease;
      }
      .small-btn:active {
        transform: scale(0.95);
      }

      /* ─────────────────────────────── BOTTOM NAV ─────────────────────────────── */
      #bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: calc(60px + var(--sb));
        padding: 6px 0 var(--sb);
        background: var(--glass);
        border-top: 1px solid var(--glass-border);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: space-around;
        z-index: 100;
        box-shadow: 0 -4px 12px rgba(120, 60, 0, 0.1);
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        text-decoration: none;
        color: #8f612f;
        transition: color 0.2s ease, transform 0.1s ease;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .nav-item.active {
        color: var(--saffron);
      }

      .nav-item:active {
        transform: scale(0.92);
      }

      .nav-icon {
        font-size: 1.4rem;
        line-height: 1;
      }

      .nav-label {
        font-size: 0.55rem;
      }

      @media (orientation: landscape) and (max-height: 520px) {
        #app {
          padding-bottom: calc(var(--sb) + 50px);
        }
        #slide-wrap {
          height: 80px;
        }
        #mantra-box {
          padding: 6px 10px;
        }
        #count-circle {
          width: clamp(90px, 28vw, 120px);
          height: clamp(90px, 28vw, 120px);
        }
      }
    </style>
  </head>
  <body>
    <div id="bg" aria-hidden="true"></div>

    <div id="app">
      <div id="topbar">
        <div id="brand">
          <img id="badge" src="logo.jpeg" alt="Logo" />
          <div id="brand-copy">
            <span id="brand-name">ISKCON NRJD</span>
            <span id="brand-sub">Japa Counter</span>
          </div>
        </div>
        <span id="device-time">--:--</span>
      </div>

      <!-- SWIPEABLE TABS -->
      <div id="tabs-container">
        <div id="tabs-wrapper">
          <button class="tab active" data-mode="hk">Hare Krishna</button>
          <button class="tab" data-mode="nr">Narasimha</button>
          <button class="tab" data-mode="dv">Dhanvantara</button>
        </div>
      </div>

      <div id="content">
        <div id="slide-wrap" aria-hidden="true"></div>

        <div id="mantra-box" role="region" aria-live="polite">
          <div id="mantra-title">Mantra</div>
          <div id="mantra-native"></div>
          <div id="mantra-roman"></div>
        </div>

        <div id="counter-card">
          <div id="counter-label">Bead Counter</div>
          <div id="count-circle" aria-live="polite" aria-label="Current bead count">
            <span id="count-value">000</span>
            <span id="count-caption">Current Beads</span>
          </div>

          <div id="round-row">
            <span class="stat-chip" id="round-chip">Rounds: 0</span>
            <span class="stat-chip" id="total-chip">Total: 0</span>
          </div>

          <div id="btns-container">
            <button id="plus-btn" aria-label="Increase count">+</button>

            <div id="controls-row">
              <button class="small-btn" id="minus-btn" aria-label="Decrease count">−</button>
              <button class="small-btn" id="reset-mode-btn">Reset This</button>
              <button class="small-btn" id="reset-all-btn">Reset All</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div id="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-icon">📿</div>
        <div class="nav-label">Session</div>
      </a>
      <a href="stopwatch.html" class="nav-item">
        <div class="nav-icon">⏱️</div>
        <div class="nav-label">Stopwatch</div>
      </a>
      <a href="counter.html" class="nav-item active">
        <div class="nav-icon">🔢</div>
        <div class="nav-label">Counter</div>
      </a>
    </div>

    <script>
      "use strict";

      const MODES = {
        hk: {
          name: "Hare Krishna Counter",
          folder: "NRJD_Pics",
          listUrl: "image-list.json",
          native:
            "हरे कृष्ण हरे कृष्ण कृष्ण कृष्ण हरे हरे। हरे राम हरे राम राम राम हरे हरे॥",
          roman:
            "Hare Krishna Hare Krishna Krishna Krishna Hare Hare | Hare Rama Hare Rama Rama Rama Hare Hare ||",
        },
        nr: {
          name: "Narasimha Counter",
          folder: "NarashimaDev_pics",
          listUrl: "narashima-image-list.json",
          native:
            "ॐ उग्रं वीरं महाविष्णुं ज्वलन्तं सर्वतोमुखम्। नृसिंहं भीषणं भद्रं मृत्युमृत्युं नमाम्यहम्॥",
          roman:
            "Om Ugram Veeram Maha-Vishnum Jvalantam Sarvato Mukham | Nrisimham Bheeshanam Bhadram Mrityur-Mrityum Namaamyaham ||",
        },
        dv: {
          name: "Dhanvantara Counter",
          folder: "NRJD_Pics",
          listUrl: "image-list.json",
          native:
            "ॐ धं धन्वन्तरये नमः ॐ",
          roman:
            "Om Dham Dhanvantarayē Namah Om",
        },
      };

      const STORAGE_KEY = "japa_counter_state_v2";
      const BEADS_PER_ROUND = 108;

      const state = loadState();
      let mode = state.lastMode || "hk";
      let slides = [];
      let slideIdx = 0;
      let slideTimer = null;
      let touchStartX = 0;
      let touchEndX = 0;

      const $ = (id) => document.getElementById(id);

      function loadState() {
        const base = {
          hk: { rounds: 0, bead: 0 },
          nr: { rounds: 0, bead: 0 },
          dv: { rounds: 0, bead: 0 },
          lastMode: "hk",
        };
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          return {
            hk: norm(saved.hk),
            nr: norm(saved.nr),
            dv: norm(saved.dv),
            lastMode: ["hk", "nr", "dv"].includes(saved.lastMode) ? saved.lastMode : "hk",
          };
        } catch {
          return base;
        }

        function norm(obj) {
          const r = Math.max(0, Number(obj?.rounds || 0));
          let b = Math.max(0, Number(obj?.bead || 0));
          if (b >= BEADS_PER_ROUND) b = b % BEADS_PER_ROUND;
          return { rounds: r, bead: b };
        }
      }

      function saveState() {
        state.lastMode = mode;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function asDisplay(bead) {
        return String(bead).padStart(3, "0");
      }

      function updateDeviceTime() {
        const now = new Date();
        $("device-time").textContent = now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function switchMode(newMode) {
        if (newMode !== mode && MODES[newMode]) {
          mode = newMode;
          saveState();
          updateTabsUI();
          loadSlidesForCurrentMode();
          render();
        }
      }

      function updateTabsUI() {
        const modes = ["hk", "nr", "dv"];
        const idx = modes.indexOf(mode);
        const wrapper = $("tabs-wrapper");
        wrapper.style.transform = `translateX(calc(-${idx} * 100%))`;

        document.querySelectorAll(".tab").forEach((tab, i) => {
          tab.classList.toggle("active", i === idx);
        });
      }

      function render() {
        const m = MODES[mode];
        const s = state[mode];
        $("counter-label").textContent = m.name;
        $("mantra-native").textContent = m.native;
        $("mantra-roman").textContent = m.roman;

        $("count-value").textContent = asDisplay(s.bead);
        $("round-chip").textContent = `Rounds: ${s.rounds}`;
        $("total-chip").textContent = `Total: ${s.rounds * BEADS_PER_ROUND + s.bead}`;
      }

      function increment() {
        const s = state[mode];
        s.bead += 1;
        if (s.bead >= BEADS_PER_ROUND) {
          s.bead = 0;
          s.rounds += 1;
        }
        saveState();
        render();
      }

      function decrement() {
        const s = state[mode];
        if (s.bead > 0) {
          s.bead -= 1;
        } else if (s.rounds > 0) {
          s.rounds -= 1;
          s.bead = BEADS_PER_ROUND - 1;
        }
        saveState();
        render();
      }

      function resetMode() {
        state[mode] = { rounds: 0, bead: 0 };
        saveState();
        render();
      }

      function resetAll() {
        state.hk = { rounds: 0, bead: 0 };
        state.nr = { rounds: 0, bead: 0 };
        state.dv = { rounds: 0, bead: 0 };
        saveState();
        render();
      }

      async function loadSlidesForCurrentMode() {
        const wrap = $("slide-wrap");
        wrap.innerHTML = "";
        clearInterval(slideTimer);
        slideTimer = null;
        slideIdx = 0;
        slides = [];

        const m = MODES[mode];
        let list = [];
        for (const u of [m.listUrl, `/api/images?type=${mode}`]) {
          try {
            const r = await fetch(u);
            if (!r.ok) continue;
            const d = await r.json();
            if (Array.isArray(d) && d.length) {
              list = d;
              break;
            }
          } catch {}
        }

        if (!list.length) {
          const empty = document.createElement("div");
          empty.style.cssText =
            "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:#7e5226;";
          empty.textContent = `No images in ${m.folder}`;
          wrap.appendChild(empty);
          return;
        }

        slides = list.map((f) => `/${m.folder}/${encodeURIComponent(f)}`);

        const a = document.createElement("div");
        const b = document.createElement("div");
        a.className = "slide active";
        b.className = "slide";
        a.style.backgroundImage = `url("${slides[0]}")`;
        wrap.append(a, b);

        slides.forEach((src) => {
          const im = new Image();
          im.src = src;
        });

        function nextSlide() {
          slideIdx = (slideIdx + 1) % slides.length;
          const sa = wrap.querySelectorAll(".slide");
          sa[0].classList.remove("active");
          sa[1].classList.add("active");
          sa[1].style.backgroundImage = `url("${slides[slideIdx]}")`;
          wrap.append(sa[0]);
        }

        slideTimer = setInterval(nextSlide, 2000);
      }

      /* ─── SWIPE GESTURE SUPPORT ─── */
      document.addEventListener("touchstart", (e) => {
        touchStartX = e.changedTouches[0].screenX;
      });

      document.addEventListener("touchend", (e) => {
        touchEndX = e.changedTouches[0].screenX;
        const delta = touchStartX - touchEndX;
        const threshold = 40;

        if (Math.abs(delta) > threshold) {
          const modes = ["hk", "nr", "dv"];
          const idx = modes.indexOf(mode);

          if (delta > 0 && idx < modes.length - 1) {
            // Swiped left → next
            switchMode(modes[idx + 1]);
          } else if (delta < 0 && idx > 0) {
            // Swiped right → prev
            switchMode(modes[idx - 1]);
          }
        }
      });

      /* ─── EVENT LISTENERS ─── */
      $("plus-btn").addEventListener("click", increment);
      $("minus-btn").addEventListener("click", decrement);
      $("reset-mode-btn").addEventListener("click", resetMode);
      $("reset-all-btn").addEventListener("click", resetAll);

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          const newMode = tab.dataset.mode;
          switchMode(newMode);
        });
      });

      /* ─── INIT ─── */
      setInterval(updateDeviceTime, 1000);
      updateDeviceTime();
      updateTabsUI();
      loadSlidesForCurrentMode();
      render();
    </script>
  </body>
</html>
