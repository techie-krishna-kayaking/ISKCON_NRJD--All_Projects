<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#fdf6ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Japa Counter</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Nunito:wght@400;500;700;800&family=Noto+Serif+Devanagari:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #fdf6ec;
        --saffron: #e07820;
        --marigold: #f0a830;
        --ink: #1e1008;
        --ink-soft: #70441b;
        --glass: rgba(253, 246, 236, 0.78);
        --glass-deep: rgba(249, 238, 218, 0.9);
        --glass-border: rgba(196, 130, 30, 0.22);
        --shadow: rgba(120, 60, 0, 0.18);
        --f-sacred: "Cinzel", Georgia, serif;
        --f-ui: "Nunito", "Segoe UI", sans-serif;
        --f-deva: "Noto Serif Devanagari", serif;
        --st: env(safe-area-inset-top, 0px);
        --sb: env(safe-area-inset-bottom, 0px);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      body {
        overflow: hidden;
        font-family: var(--f-ui);
        color: var(--ink);
        background: var(--cream);
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      button {
        font-family: var(--f-ui);
        border: none;
        background: none;
        color: inherit;
        cursor: pointer;
      }

      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(ellipse 70% 55% at 10% 6%, rgba(240, 168, 48, 0.24) 0%, transparent 62%),
          radial-gradient(ellipse 65% 48% at 92% 92%, rgba(224, 120, 32, 0.16) 0%, transparent 62%),
          linear-gradient(158deg, #fef9f1 0%, #faecd9 48%, #fdf3e4 100%);
      }

      #app {
        position: fixed;
        inset: 0;
        z-index: 3;
        display: flex;
        flex-direction: column;
        gap: clamp(8px, 1.5vh, 14px);
        padding: calc(var(--st) + 10px) clamp(12px, 3.2vw, 22px)
          calc(var(--sb) + 12px);
      }

      #topbar {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      #device-time {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        min-width: 124px;
        text-align: center;
        font-family: var(--f-sacred);
        font-size: clamp(0.62rem, 1.6vw, 0.82rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #9a642f;
        background: rgba(255, 247, 233, 0.86);
        border: 1px solid var(--glass-border);
        border-radius: 999px;
        padding: 7px 14px;
        box-shadow: 0 4px 12px rgba(150, 90, 20, 0.08);
      }
      #brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #badge {
        width: clamp(34px, 8vw, 46px);
        height: clamp(34px, 8vw, 46px);
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 6px 18px rgba(212, 134, 15, 0.35);
      }
      #brand-copy {
        display: flex;
        flex-direction: column;
        line-height: 1.18;
      }
      #brand-name {
        font-family: var(--f-sacred);
        font-size: clamp(0.56rem, 1.5vw, 0.84rem);
        font-weight: 700;
        color: #c57514;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }
      #brand-sub {
        font-size: clamp(0.45rem, 1.2vw, 0.62rem);
        color: var(--ink-soft);
        letter-spacing: 0.07em;
      }

      .ic-btn {
        width: clamp(34px, 7.2vw, 42px);
        height: clamp(34px, 7.2vw, 42px);
        border-radius: 11px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(12px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.58),
          0 4px 12px rgba(120, 60, 0, 0.1);
        font-size: clamp(0.85rem, 2vw, 1.03rem);
      }

      #tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 4px;
        box-shadow: 0 6px 20px rgba(120, 60, 0, 0.1);
      }
      .tab {
        min-height: 40px;
        border-radius: 12px;
        font-size: clamp(0.66rem, 1.8vw, 0.8rem);
        font-weight: 800;
        letter-spacing: 0.04em;
        color: #8f612f;
        transition: all 0.2s ease;
      }
      .tab.active {
        color: #ffffff;
        background: linear-gradient(140deg, var(--saffron), var(--marigold));
        box-shadow: 0 4px 14px rgba(180, 90, 14, 0.35);
      }

      #content {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: clamp(10px, 1.8vh, 16px);
      }

      #slide-wrap {
        position: relative;
        height: clamp(120px, 26vh, 220px);
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--glass-border);
        background: rgba(40, 26, 12, 0.08);
        box-shadow: 0 8px 24px rgba(90, 40, 6, 0.16);
      }
      .slide {
        position: absolute;
        inset: 0;
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        opacity: 0;
        transition: opacity 1.9s ease;
      }
      .slide.active {
        opacity: 1;
      }
      #slide-wrap::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(253, 246, 236, 0.05) 0%,
          rgba(253, 246, 236, 0.5) 100%
        );
        pointer-events: none;
      }

      #mantra-box {
        text-align: center;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        padding: clamp(10px, 2.3vw, 14px) clamp(12px, 3vw, 18px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62),
          0 6px 20px rgba(120, 60, 0, 0.1);
      }
      #mantra-title {
        font-family: var(--f-sacred);
        font-size: clamp(0.55rem, 1.4vw, 0.72rem);
        font-weight: 800;
        letter-spacing: 0.17em;
        text-transform: uppercase;
        color: #cf7a19;
        margin-bottom: 6px;
      }
      #mantra-native {
        font-family: var(--f-deva);
        font-size: clamp(0.68rem, 1.8vw, 0.9rem);
        line-height: 1.58;
        color: #5c3416;
      }
      #mantra-roman {
        margin-top: 6px;
        font-size: clamp(0.63rem, 1.6vw, 0.78rem);
        line-height: 1.55;
        font-weight: 700;
        color: #7c4b21;
      }

      #counter-card {
        flex: 1;
        min-height: 0;
        border-radius: 20px;
        padding: clamp(12px, 2.4vw, 18px);
        border: 1px solid var(--glass-border);
        background: linear-gradient(
            150deg,
            rgba(255, 200, 120, 0.18) 0%,
            rgba(255, 240, 214, 0.05) 38%,
            rgba(255, 190, 110, 0.16) 100%
          ),
          var(--glass-deep);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.58),
          0 12px 28px rgba(120, 60, 0, 0.13);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: clamp(12px, 2.2vh, 18px);
      }

      #counter-label {
        font-family: var(--f-sacred);
        font-size: clamp(0.82rem, 2.3vw, 1.02rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #8f541f;
      }

      #count-circle {
        width: clamp(168px, 46vw, 236px);
        height: clamp(168px, 46vw, 236px);
        border-radius: 50%;
        border: 2px solid rgba(224, 120, 32, 0.36);
        background: radial-gradient(
            circle at 28% 22%,
            rgba(255, 255, 255, 0.76),
            rgba(255, 255, 255, 0) 34%
          ),
          linear-gradient(160deg, #fff7e8 0%, #f8e4bf 100%);
        box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.78),
          0 0 0 6px rgba(224, 120, 32, 0.11),
          0 12px 28px rgba(160, 85, 12, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
      }
      #count-value {
        font-family: var(--f-sacred);
        font-size: clamp(2.3rem, 10vw, 4rem);
        font-weight: 900;
        letter-spacing: 0.04em;
        color: #7c4418;
        text-shadow: 0 2px 12px rgba(224, 120, 32, 0.18);
      }
      #count-caption {
        text-transform: uppercase;
        font-size: clamp(0.45rem, 1.1vw, 0.58rem);
        font-weight: 800;
        letter-spacing: 0.18em;
        color: #9a5f2d;
      }

      #round-row {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
      }
      .stat-chip {
        background: rgba(255, 245, 226, 0.95);
        color: #8d5524;
        border: 1px solid rgba(196, 130, 30, 0.3);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: clamp(0.62rem, 1.5vw, 0.78rem);
        letter-spacing: 0.05em;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(120, 60, 0, 0.08);
      }

      #btns {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: clamp(12px, 3vw, 20px);
      }
      .count-btn {
        width: clamp(88px, 24vw, 130px);
        height: clamp(44px, 9vw, 54px);
        border-radius: 999px;
        color: #fff6ea;
        border: 1px solid rgba(255, 245, 220, 0.56);
        background: radial-gradient(
            circle at 12% 18%,
            rgba(255, 255, 255, 0.5),
            transparent 44%
          ),
          linear-gradient(150deg, var(--saffron) 0%, var(--marigold) 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45),
          0 8px 20px rgba(180, 90, 14, 0.34),
          0 0 16px rgba(240, 168, 48, 0.25);
        font-size: clamp(1.48rem, 4.2vw, 2rem);
        font-weight: 800;
        line-height: 1;
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }
      .count-btn:active {
        transform: scale(0.9);
      }

      #controls-row {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .small-btn {
        min-height: 36px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(255, 245, 226, 0.95);
        color: #8d5524;
        border: 1px solid rgba(196, 130, 30, 0.26);
        font-size: clamp(0.6rem, 1.5vw, 0.72rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        box-shadow: 0 4px 12px rgba(120, 60, 0, 0.09);
      }

      #bottom-links {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .nav-link {
        text-decoration: none;
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border-radius: 999px;
        background: var(--glass-deep);
        border: 1px solid var(--glass-border);
        color: #7a4c25;
        font-size: clamp(0.64rem, 1.6vw, 0.78rem);
        font-weight: 800;
        letter-spacing: 0.03em;
      }

      @media (orientation: landscape) and (max-height: 520px) {
        #app {
          overflow-y: auto;
        }
        #counter-card {
          min-height: 220px;
        }
        #slide-wrap {
          height: 110px;
        }
      }
    </style>
  </head>
  <body>
    <div id="bg" aria-hidden="true"></div>

    <div id="app">
      <div id="topbar">
        <div id="brand">
          <img id="badge" src="logo.jpeg" alt="Logo" />
          <div id="brand-copy">
            <span id="brand-name">ISKCON NRJD</span>
            <span id="brand-sub">Japa Counter</span>
          </div>
        </div>
        <span id="device-time">--:--</span>
        <button class="ic-btn" id="btn-fs" title="Fullscreen">⛶</button>
      </div>

      <div id="tabs">
        <button class="tab active" id="tab-hk">Hare Krishna Counter</button>
        <button class="tab" id="tab-nr">Narasimha Counter</button>
      </div>

      <div id="content">
        <div id="slide-wrap" aria-hidden="true"></div>

        <div id="mantra-box" role="region" aria-live="polite">
          <div id="mantra-title">Mantra</div>
          <div id="mantra-native"></div>
          <div id="mantra-roman"></div>
        </div>

        <div id="counter-card">
          <div id="counter-label">Bead Counter</div>
          <div id="count-circle" aria-live="polite" aria-label="Current bead count">
            <span id="count-value">000</span>
            <span id="count-caption">Current Beads</span>
          </div>

          <div id="round-row">
            <span class="stat-chip" id="round-chip">Rounds: 0</span>
            <span class="stat-chip" id="total-chip">Total Japa: 0</span>
          </div>

          <div id="btns">
            <button class="count-btn" id="plus-btn" aria-label="Increase count">+</button>
            <button class="count-btn" id="minus-btn" aria-label="Decrease count">−</button>
          </div>

          <div id="controls-row">
            <button class="small-btn" id="reset-mode-btn">Reset This Counter</button>
            <button class="small-btn" id="reset-all-btn">Reset Both</button>
          </div>
        </div>
      </div>

      <div id="bottom-links">
        <a class="nav-link" href="index.html">← Session</a>
        <a class="nav-link" href="stopwatch.html">⏱ Stopwatch</a>
      </div>
    </div>

    <script>
      "use strict";

      const MODES = {
        hk: {
          name: "Hare Krishna Counter",
          folder: "NRJD_Pics",
          listUrl: "image-list.json",
          native:
            "हरे कृष्ण हरे कृष्ण कृष्ण कृष्ण हरे हरे। हरे राम हरे राम राम राम हरे हरे॥",
          roman:
            "Hare Krishna Hare Krishna Krishna Krishna Hare Hare | Hare Rama Hare Rama Rama Rama Hare Hare ||",
        },
        nr: {
          name: "Narasimha Counter",
          folder: "NarashimaDev_pics",
          listUrl: "narashima-image-list.json",
          native:
            "ॐ उग्रं वीरं महाविष्णुं ज्वलन्तं सर्वतोमुखम्। नृसिंहं भीषणं भद्रं मृत्युमृत्युं नमाम्यहम्॥",
          roman:
            "Om Ugram Veeram Maha-Vishnum Jvalantam Sarvato Mukham | Nrisimham Bheeshanam Bhadram Mrityur-Mrityum Namaamyaham ||",
        },
      };

      const STORAGE_KEY = "japa_counter_state_v1";
      const BEADS_PER_ROUND = 108;

      const state = loadState();
      let mode = state.lastMode || "hk";
      let slides = [];
      let slideIdx = 0;
      let slideTimer = null;

      const $ = (id) => document.getElementById(id);

      function loadState() {
        const base = {
          hk: { rounds: 0, bead: 0 },
          nr: { rounds: 0, bead: 0 },
          lastMode: "hk",
        };
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          return {
            hk: norm(saved.hk),
            nr: norm(saved.nr),
            lastMode: saved.lastMode === "nr" ? "nr" : "hk",
          };
        } catch {
          return base;
        }

        function norm(obj) {
          const r = Math.max(0, Number(obj?.rounds || 0));
          let b = Math.max(0, Number(obj?.bead || 0));
          if (b >= BEADS_PER_ROUND) b = b % BEADS_PER_ROUND;
          return { rounds: r, bead: b };
        }
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function asDisplay(bead) {
        return String(bead).padStart(3, "0");
      }

      function updateDeviceTime() {
        const now = new Date();
        $("device-time").textContent = now.toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function render() {
        const m = MODES[mode];
        const s = state[mode];
        $("counter-label").textContent = m.name;
        $("mantra-native").textContent = m.native;
        $("mantra-roman").textContent = m.roman;

        $("count-value").textContent = asDisplay(s.bead);

        $("round-chip").textContent = `Rounds: ${s.rounds}`;
        $("total-chip").textContent = `Total Japa: ${s.rounds * BEADS_PER_ROUND + s.bead}`;
        $("tab-hk").classList.toggle("active", mode === "hk");
        $("tab-nr").classList.toggle("active", mode === "nr");
      }

      function increment() {
        const s = state[mode];
        s.bead += 1;
        if (s.bead >= BEADS_PER_ROUND) {
          s.bead = 0;
          s.rounds += 1;
        }
        saveState();
        render();
      }

      function decrement() {
        const s = state[mode];
        if (s.bead > 0) {
          s.bead -= 1;
        } else if (s.rounds > 0) {
          s.rounds -= 1;
          s.bead = BEADS_PER_ROUND - 1;
        }
        saveState();
        render();
      }

      function resetMode() {
        state[mode] = { rounds: 0, bead: 0 };
        saveState();
        render();
      }

      function resetAll() {
        state.hk = { rounds: 0, bead: 0 };
        state.nr = { rounds: 0, bead: 0 };
        saveState();
        render();
      }

      async function loadSlidesForCurrentMode() {
        const wrap = $("slide-wrap");
        wrap.innerHTML = "";
        clearInterval(slideTimer);
        slideTimer = null;
        slideIdx = 0;
        slides = [];

        const m = MODES[mode];
        let list = [];
        for (const u of [m.listUrl, `/api/images?type=${mode}`]) {
          try {
            const r = await fetch(u);
            if (!r.ok) continue;
            const d = await r.json();
            if (Array.isArray(d) && d.length) {
              list = d;
              break;
            }
          } catch {}
        }

        if (!list.length) {
          const empty = document.createElement("div");
          empty.style.cssText =
            "position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.8rem;color:#7e5226;";
          empty.textContent = `No images in ${m.folder}`;
          wrap.appendChild(empty);
          return;
        }

        slides = list.map((f) => `/${m.folder}/${encodeURIComponent(f)}`);

        const a = document.createElement("div");
        const b = document.createElement("div");
        a.className = "slide active";
        b.className = "slide";
        a.style.backgroundImage = `url("${slides[0]}")`;
        wrap.append(a, b);

        slides.forEach((src) => {
          const im = new Image();
          im.src = src;
        });

        if (slides.length > 1) {
          slideTimer = setInterval(() => {
            slideIdx = (slideIdx + 1) % slides.length;
            const [next, prev] = a.classList.contains("active") ? [b, a] : [a, b];
            next.style.backgroundImage = `url("${slides[slideIdx]}")`;
            prev.classList.remove("active");
            next.classList.add("active");
          }, 10000);
        }
      }

      async function setMode(nextMode) {
        if (mode === nextMode) return;
        mode = nextMode;
        state.lastMode = mode;
        saveState();
        render();
        await loadSlidesForCurrentMode();
      }

      function toggleFS() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      }

      $("tab-hk").addEventListener("click", () => setMode("hk"));
      $("tab-nr").addEventListener("click", () => setMode("nr"));
      $("plus-btn").addEventListener("click", increment);
      $("minus-btn").addEventListener("click", decrement);
      $("reset-mode-btn").addEventListener("click", resetMode);
      $("reset-all-btn").addEventListener("click", resetAll);
      $("btn-fs").addEventListener("click", toggleFS);

      document.addEventListener("keydown", (e) => {
        if (e.key === "+" || e.key === "=" || e.key === "ArrowUp") increment();
        if (e.key === "-" || e.key === "ArrowDown") decrement();
        if (e.key === "1") setMode("hk");
        if (e.key === "2") setMode("nr");
        if (e.key === "f" || e.key === "F") toggleFS();
      });

      render();
      updateDeviceTime();
      setInterval(updateDeviceTime, 1000);
      loadSlidesForCurrentMode();
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }
    </script>
  </body>
</html>
