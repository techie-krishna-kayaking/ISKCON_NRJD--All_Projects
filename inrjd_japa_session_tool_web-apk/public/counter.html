<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#fdf6ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Japa Counter</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Nunito:wght@300;400;500;600;700&family=Noto+Serif+Devanagari:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --cream: #fdf6ec;
        --saffron: #e07820;
        --marigold: #f0a830;
        --ink: #1e1008;
        --ink-soft: #70441b;
        --glass: rgba(253, 246, 236, 0.76);
        --glass-deep: rgba(250, 239, 218, 0.86);
        --glass-border: rgba(196, 130, 30, 0.22);
        --f-sacred: "Cinzel", Georgia, serif;
        --f-ui: "Nunito", "Segoe UI", sans-serif;
        --f-deva: "Noto Serif Devanagari", serif;
        --st: env(safe-area-inset-top, 0px);
        --sb: env(safe-area-inset-bottom, 0px);
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { height: 100%; }
      body {
        width: 100%; height: 100%;
        overflow: hidden;
        font-family: var(--f-ui);
        background: var(--cream);
        color: var(--ink);
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      button { font-family: var(--f-ui); cursor: pointer; border: none; outline: none; background: none; color: inherit; }

      /* ──────────────── BACKGROUND ──────────────── */
      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 70% 55% at 12% 8%, rgba(240, 168, 48, 0.2) 0%, transparent 60%),
          radial-gradient(ellipse 55% 48% at 90% 88%, rgba(224, 120, 32, 0.16) 0%, transparent 60%),
          linear-gradient(158deg, #fdf8f0 0%, #f8e8d0 45%, #fdf3e4 100%);
      }

      #watermark {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        align-content: center;
        justify-content: center;
        gap: 8px 20px;
        padding: 16px;
        opacity: 0.04;
        pointer-events: none;
        overflow: hidden;
      }
      #watermark span {
        font-family: var(--f-sacred);
        font-size: 0.5rem;
        font-weight: 600;
        color: #b8690e;
        letter-spacing: 0.1em;
      }

      /* ──────────────── SLIDESHOW ──────────────── */
      #slideshow {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        overflow: hidden;
      }
      .slide {
        position: absolute;
        inset: 0;
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0;
        transition: opacity 2.6s ease-in-out;
        will-change: opacity;
      }
      .slide.active { opacity: 1; }
      #slideshow::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 82% 76% at 50% 50%, rgba(253, 246, 236, 0.06) 0%, rgba(253, 246, 236, 0.3) 55%, rgba(253, 246, 236, 0.8) 100%);
      }

      /* ──────────────── APP SHELL ──────────────── */
      #app {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: calc(var(--st) + 12px) clamp(14px, 3vw, 20px) calc(var(--sb) + 96px);
      }

      /* ─ TOP BAR ─ */
      #topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 0 8px;
        margin-bottom: 8px;
      }
      #brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #badge {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 3px 12px rgba(212, 134, 15, 0.3);
      }
      #brand-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #brand-name {
        font-family: var(--f-sacred);
        font-size: 0.65rem;
        font-weight: 700;
        color: #c57514;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #brand-sub {
        font-size: 0.5rem;
        color: #8f6b45;
      }
      #device-time {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-family: var(--f-sacred);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #9a642f;
        min-width: 180px;
        line-height: 1.3;
      }
      #topbar-right {
        display: flex;
        gap: 8px;
      }
      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 2px 8px rgba(120, 60, 0, 0.08);
        font-size: 0.9rem;
        transition: transform 0.1s;
      }
      .icon-btn:active { transform: scale(0.92); }

      /* ─ COUNTER SETTINGS PANEL ─ */
      #settings-panel {
        position: fixed;
        top: calc(var(--st) + 56px);
        right: clamp(12px, 3vw, 20px);
        z-index: 130;
        width: min(92vw, 300px);
        background: var(--glass-deep);
        border: 1px solid var(--glass-border);
        border-radius: 14px;
        box-shadow: 0 12px 28px rgba(90, 40, 6, 0.16);
        padding: 10px;
        display: none;
      }
      #settings-panel.show {
        display: block;
      }
      #settings-title {
        font-family: var(--f-sacred);
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: #b8690e;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      #preset-wrap {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .preset-btn {
        flex: 1;
        padding: 8px 6px;
        border-radius: 9px;
        border: 1px solid rgba(196, 130, 30, 0.22);
        background: rgba(255, 245, 226, 0.95);
        color: #8d5524;
        font-size: 0.72rem;
        font-weight: 800;
      }
      .preset-btn.active {
        background: linear-gradient(140deg, var(--saffron), var(--marigold));
        color: #fff;
      }
      #custom-row {
        display: flex;
        gap: 6px;
      }
      #target-input {
        flex: 1;
        min-width: 0;
        border-radius: 9px;
        border: 1px solid rgba(196, 130, 30, 0.26);
        padding: 8px 10px;
        font-size: 0.74rem;
        font-weight: 700;
        color: #70441b;
        background: #fff9ef;
      }
      #apply-target {
        border-radius: 9px;
        border: 1px solid rgba(196, 130, 30, 0.2);
        background: rgba(255, 245, 226, 0.95);
        color: #8d5524;
        padding: 8px 12px;
        font-size: 0.72rem;
        font-weight: 800;
      }

      /* ─ TABS ─ */
      #tabs-label {
        font-family: var(--f-sacred);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #b8690e;
        margin-bottom: 6px;
        text-align: center;
      }

      #tabs-container {
        display: flex;
        gap: 4px;
        width: min(100%, 760px);
        align-self: center;
        margin-bottom: 10px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .tab {
        flex: 1;
        min-width: 100px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 245, 220, 0.9);
        border: 1px solid rgba(196, 130, 30, 0.2);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #8f6b45;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .tab.active {
        background: linear-gradient(140deg, var(--saffron), var(--marigold));
        color: #fff;
        box-shadow: 0 4px 12px rgba(180, 90, 14, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* ─ MANTRA DISPLAY ─ */
      #mantra-box {
        text-align: center;
        width: min(100%, 760px);
        align-self: center;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 8px 10px;
        margin-bottom: 8px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 3px 10px rgba(120, 60, 0, 0.08);
      }
      #mantra-box,
      #counter-display,
      #controls,
      #stats {
        transition: opacity 0.24s ease, transform 0.24s ease;
      }
      #app.mode-next #mantra-box,
      #app.mode-next #counter-display,
      #app.mode-next #controls,
      #app.mode-next #stats {
        opacity: 0.78;
        transform: translateX(12px);
      }
      #app.mode-prev #mantra-box,
      #app.mode-prev #counter-display,
      #app.mode-prev #controls,
      #app.mode-prev #stats {
        opacity: 0.78;
        transform: translateX(-12px);
      }
      #mantra-title {
        font-family: var(--f-sacred);
        font-size: 0.58rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #cf7a19;
        margin-bottom: 4px;
      }
      #mantra-native {
        font-family: var(--f-deva);
        font-size: 0.72rem;
        line-height: 1.5;
        color: #5c3416;
      }
      #mantra-roman {
        margin-top: 4px;
        font-size: 0.62rem;
        line-height: 1.4;
        font-weight: 700;
        color: #7c4b21;
      }

      /* ─ SLIDESHOW AREA ─ */
      #slideshow-area {
        position: relative;
        flex: 1;
        min-height: 0;
        border-radius: 0;
        overflow: hidden;
        border: none;
        background: transparent;
        box-shadow: none;
        margin-bottom: 10px;
      }

      /* ─ COUNTER DISPLAY ─ */
      #counter-display {
        position: relative;
        width: clamp(180px, 40vw, 260px);
        height: clamp(120px, 15vh, 156px);
        border-radius: 24px;
        background: radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0) 34%), linear-gradient(160deg, #fff7e8 0%, #f8e4bf 100%);
        border: 3px solid rgba(224, 120, 32, 0.5);
        box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.85), 0 8px 20px rgba(160, 85, 12, 0.28);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        align-self: center;
        margin: 0 auto 16px;
      }
      #count-value {
        font-family: var(--f-sacred);
        font-size: clamp(2.6rem, 6vw, 3.6rem);
        font-weight: 900;
        color: #7c4418;
        text-shadow: 0 2px 8px rgba(224, 120, 32, 0.18);
        line-height: 1;
      }
      #count-label {
        font-size: clamp(0.7rem, 1.4vw, 0.9rem);
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #9a5f2d;
      }

      /* ─ CONTROLS ─ */
      #controls {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        width: 100%;
        align-self: center;
        gap: 12px;
        padding: 6px 0 0;
        margin-top: 2px;
        margin-bottom: 10px;
      }

      .reset-btn {
        justify-self: start;
        min-height: 44px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(255, 245, 226, 0.94);
        border: 1px solid rgba(196, 130, 30, 0.24);
        color: #8d5524;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        box-shadow: 0 3px 10px rgba(120, 60, 0, 0.08);
        transition: transform 0.08s;
      }
      .reset-btn:active { transform: scale(0.94); }

      .plus-btn {
        justify-self: center;
        width: 116px;
        height: 116px;
        border-radius: 50%;
        background: radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.55), transparent 44%), linear-gradient(150deg, #e07820 0%, #f0a830 100%);
        border: 3px solid rgba(255, 245, 220, 0.6);
        color: #fff6ea;
        font-size: 3.5rem;
        font-weight: 900;
        line-height: 1;
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.52), 0 14px 32px rgba(180, 90, 14, 0.44), 0 0 16px rgba(240, 168, 48, 0.32);
        transition: transform 0.1s, box-shadow 0.1s;
        flex-shrink: 0;
        position: relative;
        z-index: 8;
        margin-top: -10px;
      }
      .plus-btn:active {
        transform: scale(0.86);
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.52), 0 8px 16px rgba(180, 90, 14, 0.32);
      }

      .minus-btn {
        justify-self: end;
        width: 56px;
        height: 56px;
        border-radius: 999px;
        background: rgba(255, 245, 226, 0.93);
        border: 1px solid rgba(196, 130, 30, 0.24);
        color: #8d5524;
        font-size: 1.8rem;
        font-weight: 700;
        box-shadow: 0 3px 10px rgba(120, 60, 0, 0.08);
        transition: transform 0.08s;
        flex-shrink: 0;
      }
      .minus-btn:active { transform: scale(0.92); }

      /* ─ STATS ─ */
      #stats {
        display: flex;
        gap: 8px;
        justify-content: center;
        width: min(100%, 760px);
        align-self: center;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .stat-chip {
        background: rgba(255, 245, 226, 0.94);
        border: 1px solid rgba(196, 130, 30, 0.26);
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 0.62rem;
        font-weight: 700;
        color: #8d5524;
        box-shadow: 0 2px 8px rgba(120, 60, 0, 0.07);
      }

      /* ─ BOTTOM NAV ─ */
      #bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: calc(60px + var(--sb));
        padding: 6px 0 var(--sb);
        background: var(--glass);
        border-top: 1px solid var(--glass-border);
        backdrop-filter: blur(12px);
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        align-items: center;
        z-index: 100;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        text-decoration: none;
        color: #8f612f;
        font-size: 0.6rem;
        font-weight: 700;
        transition: color 0.2s;
      }
      .nav-item.active { color: var(--saffron); }
      .nav-icon { font-size: 1.4rem; }
      .nav-item:nth-child(1) { grid-column: 1; }
      .nav-item:nth-child(2) { grid-column: 2; }
      .nav-item:nth-child(3) { grid-column: 3; }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <div id="watermark"></div>
    <div id="slideshow"></div>

    <div id="app">
      <!-- TOP BAR -->
      <div id="topbar">
        <div id="brand">
          <img id="badge" src="logo.jpeg" alt="Logo" />
          <div id="brand-text">
            <div id="brand-name">ISKCON NRJD</div>
            <div id="brand-sub">Japa Counter</div>
          </div>
        </div>
        <div id="device-time">00:00</div>
        <div id="topbar-right">
          <button class="icon-btn" id="btn-fs">⛶</button>
          <button class="icon-btn" id="btn-settings">⚙</button>
        </div>
      </div>

      <!-- TABS -->
      <div id="tabs-label">COUNTER MODE</div>
      <div id="tabs-container">
        <button class="tab active" data-mode="hk">Hare Krishna</button>
        <button class="tab" data-mode="nr">Ugram Veeram</button>
        <button class="tab" data-mode="dv">Dhanvantara</button>
      </div>

      <!-- MANTRA -->
      <div id="mantra-box">
        <div id="mantra-title">Mantra</div>
        <div id="mantra-native"></div>
        <div id="mantra-roman"></div>
      </div>

      <!-- SLIDESHOW -->
      <div id="slideshow-area">
      </div>

      <!-- COUNTER DISPLAY -->
      <div id="counter-display">
        <div id="count-value">000</div>
        <div id="count-label">108 × 0</div>
      </div>

      <!-- CONTROLS -->
      <div id="controls">
        <button class="reset-btn" id="reset-this">↺ Reset</button>
        <button class="plus-btn" id="plus-btn">+</button>
        <button class="minus-btn" id="minus-btn">−</button>
      </div>

      <!-- STATS -->
      <div id="stats">
        <div class="stat-chip" id="rounds-chip">Rounds: 0</div>
        <div class="stat-chip" id="total-chip">Total: 0</div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div id="bottom-nav">
      <a href="stopwatch.html" class="nav-item">
        <div class="nav-icon">⏱️</div>
        <div>Stopwatch</div>
      </a>
      <a href="index.html" class="nav-item">
        <div class="nav-icon">📿</div>
        <div>Session</div>
      </a>
      <a href="counter.html" class="nav-item active">
        <div class="nav-icon">🔢</div>
        <div>Counter</div>
      </a>
    </div>

    <!-- COUNTER SETTINGS -->
    <div id="settings-panel" aria-hidden="true">
      <div id="settings-title">Counter Target</div>
      <div id="preset-wrap">
        <button class="preset-btn" data-target="27">27</button>
        <button class="preset-btn" data-target="56">56</button>
        <button class="preset-btn" data-target="108">108</button>
      </div>
      <div id="custom-row">
        <input id="target-input" type="number" min="1" max="9999" step="1" placeholder="Custom" />
        <button id="apply-target">Apply</button>
      </div>
    </div>

    <script>
      "use strict";

      const MODES = {
        hk: {
          name: "Hare Krishna Counter",
          folder: "NRJD_Pics",
          native: "हरे कृष्ण हरे कृष्ण कृष्ण कृष्ण हरे हरे। हरे राम हरे राम राम राम हरे हरे॥",
          roman: "Hare Krishna Hare Krishna Krishna Krishna Hare Hare | Hare Rama Hare Rama Rama Rama Hare Hare ||",
        },
        nr: {
          name: "Narasimha Counter",
          folder: "NarashimaDev_pics",
          native: "ॐ उग्रं वीरं महाविष्णुं ज्वलन्तं सर्वतोमुखम्। नृसिंहं भीषणं भद्रं मृत्युमृत्युं नमाम्यहम्॥",
          roman: "Om Ugram Veeram Maha-Vishnum Jvalantam Sarvato Mukham | Nrisimham Bheeshanam Bhadram Mrityur-Mrityum Namaamyaham ||",
        },
        dv: {
          name: "Dhanvantara Counter",
          folder: "NRJD_Pics",
          native: "ॐ धं धन्वन्तरये नमः ॐ",
          roman: "Om Dham Dhanvantarayē Namah Om",
        },
      };

      const DEFAULT_ROUND_TARGETS = { hk: 108, nr: 27, dv: 56 };
      const STORAGE_KEY = "japa_counter_state_v3";
      const MODE_ORDER = ["hk", "nr", "dv"];

      let state = loadState();
      let mode = state.lastMode || "hk";
      let slides = [];
      let slideIdx = 0;
      let slideTimer = null;
      let modeAnimTimer = null;

      function loadState() {
        const base = {
          hk: { rounds: 0, bead: 0 },
          nr: { rounds: 0, bead: 0 },
          dv: { rounds: 0, bead: 0 },
          lastMode: "hk",
          targetByMode: { ...DEFAULT_ROUND_TARGETS },
        };
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          const targetByMode = normTargetByMode(saved.targetByMode, saved.target);
          return {
            hk: norm(saved.hk, targetByMode.hk),
            nr: norm(saved.nr, targetByMode.nr),
            dv: norm(saved.dv, targetByMode.dv),
            lastMode: ["hk", "nr", "dv"].includes(saved.lastMode) ? saved.lastMode : "hk",
            targetByMode,
          };
        } catch { return base; }

        function norm(obj, target) {
          const r = Math.max(0, Number(obj?.rounds || 0));
          let b = Math.max(0, Number(obj?.bead || 0));
          if (b >= target) b = b % target;
          return { rounds: r, bead: b };
        }

        function normTargetByMode(v, legacyTarget) {
          const out = { ...DEFAULT_ROUND_TARGETS };
          // Backward compatibility: if old single target exists, apply to all modes.
          const legacy = Number(legacyTarget);
          if (Number.isFinite(legacy) && legacy >= 1) {
            out.hk = Math.floor(legacy);
            out.nr = Math.floor(legacy);
            out.dv = Math.floor(legacy);
          }
          if (v && typeof v === "object") {
            MODE_ORDER.forEach((k) => {
              const n = Number(v[k]);
              if (Number.isFinite(n) && n >= 1) out[k] = Math.floor(n);
            });
          }
          return out;
        }
      }

      function getRoundTarget(modeKey = mode) {
        const n = Number(state.targetByMode?.[modeKey]);
        if (!Number.isFinite(n) || n < 1) return DEFAULT_ROUND_TARGETS[modeKey] || 108;
        return Math.floor(n);
      }

      function saveState() {
        state.lastMode = mode;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function updateDeviceTime() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const date = String(now.getDate()).padStart(2, "0");
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        document.getElementById("device-time").textContent = `${month}/${date}\n${h}:${m}`;
      }

      function render() {
        const m = MODES[mode];
        const s = state[mode];
        const roundTarget = getRoundTarget();
        const multipleCount = s.rounds * roundTarget;
        const totalCount = multipleCount + s.bead;
        document.getElementById("mantra-title").textContent = m.name;
        document.getElementById("mantra-native").textContent = m.native;
        document.getElementById("mantra-roman").textContent = m.roman;
        // Main number shows current cycle progress and resets to 0 at each multiple.
        document.getElementById("count-value").textContent = String(s.bead).padStart(3, "0");
        document.getElementById("count-label").textContent = `${roundTarget} × ${s.rounds}`;
        document.getElementById("rounds-chip").textContent = `Total Count: ${totalCount}`;
        document.getElementById("total-chip").textContent = `Multiple: ${roundTarget} × ${s.rounds} = ${multipleCount}`;

        document.querySelectorAll(".tab").forEach((t, i) => {
          t.classList.toggle("active", ["hk", "nr", "dv"][i] === mode);
        });

        document.querySelectorAll(".preset-btn").forEach((btn) => {
          btn.classList.toggle("active", Number(btn.dataset.target) === roundTarget);
        });

        const targetInput = document.getElementById("target-input");
        if (targetInput && document.activeElement !== targetInput) {
          targetInput.value = String(roundTarget);
        }
      }

      function applyRoundTarget(nextTarget) {
        const target = Number(nextTarget);
        if (!Number.isFinite(target) || target < 1) return;
        const newTarget = Math.floor(target);
        const oldTarget = getRoundTarget();
        if (newTarget === oldTarget) {
          render();
          return;
        }

        // Apply setting only to active mode/tab and reset that tab's counter.
        state.targetByMode[mode] = newTarget;
        state[mode] = { rounds: 0, bead: 0 };
        saveState();
        render();
      }

      function switchMode(m, direction = null) {
        if (m !== mode && MODES[m]) {
          const prevMode = mode;
          mode = m;
          saveState();
          loadSlides();
          render();

          const prevIdx = MODE_ORDER.indexOf(prevMode);
          const nextIdx = MODE_ORDER.indexOf(m);
          const animDir = direction || (nextIdx > prevIdx ? "next" : "prev");
          animateModeSwitch(animDir);
        }
      }

      function animateModeSwitch(direction) {
        const app = document.getElementById("app");
        if (!app) return;
        app.classList.remove("mode-next", "mode-prev");
        // Force reflow so repeated swipes retrigger animation cleanly
        void app.offsetWidth;
        app.classList.add(direction === "next" ? "mode-next" : "mode-prev");
        clearTimeout(modeAnimTimer);
        modeAnimTimer = setTimeout(() => {
          app.classList.remove("mode-next", "mode-prev");
        }, 220);
      }

      function moveModeBySwipe(direction) {
        const idx = MODE_ORDER.indexOf(mode);
        const nextIdx = direction === "next" ? idx + 1 : idx - 1;
        if (nextIdx < 0 || nextIdx >= MODE_ORDER.length) return;
        switchMode(MODE_ORDER[nextIdx], direction);
      }

      function increment() {
        const s = state[mode];
        const roundTarget = getRoundTarget();
        s.bead += 1;
        if (s.bead >= roundTarget) {
          s.bead = 0;
          s.rounds += 1;
        }
        saveState();
        render();
      }

      function decrement() {
        const s = state[mode];
        const roundTarget = getRoundTarget();
        if (s.bead > 0) {
          s.bead -= 1;
        } else if (s.rounds > 0) {
          s.rounds -= 1;
          s.bead = roundTarget - 1;
        }
        saveState();
        render();
      }

      function resetThis() {
        state[mode] = { rounds: 0, bead: 0 };
        saveState();
        render();
      }

      async function loadSlides() {
        const ss = document.getElementById("slideshow");
        ss.innerHTML = "";
        clearInterval(slideTimer);
        slides = [];
        slideIdx = 0;

        const m = MODES[mode];
        let list = [];
        for (const u of [m.folder === "NRJD_Pics" ? "image-list.json" : "narashima-image-list.json"]) {
          try {
            const r = await fetch(u);
            if (!r.ok) continue;
            const d = await r.json();
            if (Array.isArray(d) && d.length) {
              list = d;
              break;
            }
          } catch {}
        }

        if (!list.length) {
          ss.innerHTML = `<div style="inset:0;position:absolute;display:flex;align-items:center;justify-content:center;color:#7e5226;font-size:0.8rem;">No images</div>`;
          return;
        }

        slides = list.map((f) => `/${m.folder}/${encodeURIComponent(f)}`);
        const a = document.createElement("div");
        const b = document.createElement("div");
        a.className = "slide active";
        b.className = "slide";
        a.style.backgroundImage = `url("${slides[0]}")`;
        ss.append(a, b);

        function nextSlide() {
          slideIdx = (slideIdx + 1) % slides.length;
          const current = ss.querySelector(".slide.active");
          const next = current === a ? b : a;
          next.style.backgroundImage = `url("${slides[slideIdx]}")`;
          if (current) current.classList.remove("active");
          next.classList.add("active");
        }

        slideTimer = setInterval(nextSlide, 9000);
      }

      function populateWatermark() {
        const wm = document.getElementById("watermark");
        const words = ["HARE KRISHNA HARE KRISHNA", "KRISHNA KRISHNA HARE HARE", "HARE RAMA HARE RAMA", "RAMA RAMA HARE HARE"];
        for (let i = 0; i < 60; i++) {
          const s = document.createElement("span");
          s.textContent = words[i % 4];
          wm.appendChild(s);
        }
      }

      // Events
      document.querySelectorAll(".tab").forEach((t) => {
        t.addEventListener("click", () => {
          const target = t.dataset.mode;
          const currentIdx = MODE_ORDER.indexOf(mode);
          const targetIdx = MODE_ORDER.indexOf(target);
          const direction = targetIdx > currentIdx ? "next" : "prev";
          switchMode(target, direction);
        });
      });

      // Swipe gestures: right swipe -> next tab, left swipe -> left tab
      let touchStartX = 0;
      let touchStartY = 0;
      let touchStartAt = 0;
      let swipeCandidate = false;
      const swipeZone = document.getElementById("app");

      swipeZone.addEventListener(
        "touchstart",
        (e) => {
          if (!e.touches || e.touches.length !== 1) return;
          const targetEl = e.target;
          if (targetEl && targetEl.closest("#controls, #topbar-right, button, a")) return;
          const t = e.touches[0];
          touchStartX = t.clientX;
          touchStartY = t.clientY;
          touchStartAt = Date.now();
          swipeCandidate = true;
        },
        { passive: true }
      );

      swipeZone.addEventListener(
        "touchend",
        (e) => {
          if (!swipeCandidate || !e.changedTouches || !e.changedTouches.length) return;
          const t = e.changedTouches[0];
          const dx = t.clientX - touchStartX;
          const dy = t.clientY - touchStartY;
          const dt = Date.now() - touchStartAt;
          swipeCandidate = false;

          const isHorizontal = Math.abs(dx) > Math.abs(dy) * 1.2;
          const isFastEnough = dt < 700;
          const isLongEnough = Math.abs(dx) > 40;
          if (!isHorizontal || !isFastEnough || !isLongEnough) return;

          if (dx > 0) {
            moveModeBySwipe("next");
          } else {
            moveModeBySwipe("prev");
          }
        },
        { passive: true }
      );

      document.getElementById("plus-btn").addEventListener("click", increment);
      document.getElementById("minus-btn").addEventListener("click", decrement);
      document.getElementById("reset-this").addEventListener("click", resetThis);

      // Counter target settings via gear button
      const settingsBtn = document.getElementById("btn-settings");
      const settingsPanel = document.getElementById("settings-panel");
      const targetInput = document.getElementById("target-input");
      const applyTargetBtn = document.getElementById("apply-target");

      function closeSettings() {
        settingsPanel.classList.remove("show");
        settingsPanel.setAttribute("aria-hidden", "true");
      }

      function toggleSettings() {
        const willOpen = !settingsPanel.classList.contains("show");
        if (!willOpen) {
          closeSettings();
          return;
        }
        settingsPanel.classList.add("show");
        settingsPanel.setAttribute("aria-hidden", "false");
        targetInput.value = String(getRoundTarget());
      }

      settingsBtn.addEventListener("click", toggleSettings);

      document.querySelectorAll(".preset-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          applyRoundTarget(Number(btn.dataset.target));
          closeSettings();
        });
      });

      applyTargetBtn.addEventListener("click", () => {
        applyRoundTarget(Number(targetInput.value));
        closeSettings();
      });

      targetInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          applyRoundTarget(Number(targetInput.value));
          closeSettings();
        }
      });

      document.addEventListener("click", (e) => {
        if (!settingsPanel.classList.contains("show")) return;
        if (e.target.closest("#settings-panel") || e.target.closest("#btn-settings")) return;
        closeSettings();
      });

      // Init
      populateWatermark();
      setInterval(updateDeviceTime, 1000);
      updateDeviceTime();
      loadSlides();
      render();
    </script>
  </body>
</html>
