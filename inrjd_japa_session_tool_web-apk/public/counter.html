<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#fdf6ec" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Japa Counter</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Nunito:wght@300;400;500;600;700&family=Noto+Serif+Devanagari:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --cream: #fdf6ec;
        --saffron: #e07820;
        --marigold: #f0a830;
        --ink: #1e1008;
        --ink-soft: #70441b;
        --glass: rgba(253, 246, 236, 0.76);
        --glass-deep: rgba(250, 239, 218, 0.86);
        --glass-border: rgba(196, 130, 30, 0.22);
        --f-sacred: "Cinzel", Georgia, serif;
        --f-ui: "Nunito", "Segoe UI", sans-serif;
        --f-deva: "Noto Serif Devanagari", serif;
        --st: env(safe-area-inset-top, 0px);
        --sb: env(safe-area-inset-bottom, 0px);
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { height: 100%; }
      body {
        width: 100%; height: 100%;
        overflow: hidden;
        font-family: var(--f-ui);
        background: var(--cream);
        color: var(--ink);
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      button { font-family: var(--f-ui); cursor: pointer; border: none; outline: none; background: none; color: inherit; }

      /* ──────────────── BACKGROUND ──────────────── */
      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 70% 55% at 12% 8%, rgba(240, 168, 48, 0.2) 0%, transparent 60%),
          radial-gradient(ellipse 55% 48% at 90% 88%, rgba(224, 120, 32, 0.16) 0%, transparent 60%),
          linear-gradient(158deg, #fdf8f0 0%, #f8e8d0 45%, #fdf3e4 100%);
      }

      #watermark {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        align-content: center;
        justify-content: center;
        gap: 8px 20px;
        padding: 16px;
        opacity: 0.04;
        pointer-events: none;
        overflow: hidden;
      }
      #watermark span {
        font-family: var(--f-sacred);
        font-size: 0.5rem;
        font-weight: 600;
        color: #b8690e;
        letter-spacing: 0.1em;
      }

      /* ──────────────── SLIDESHOW ──────────────── */
      #slideshow {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        overflow: hidden;
      }
      .slide {
        position: absolute;
        inset: 0;
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0;
        transition: opacity 2.4s ease-in-out;
      }
      .slide.active { opacity: 1; }
      #slideshow::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 82% 76% at 50% 50%, rgba(253, 246, 236, 0.06) 0%, rgba(253, 246, 236, 0.3) 55%, rgba(253, 246, 236, 0.8) 100%);
      }

      /* ──────────────── APP SHELL ──────────────── */
      #app {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: calc(var(--st) + 12px) clamp(14px, 3vw, 20px) calc(var(--sb) + 8px);
      }

      /* ─ TOP BAR ─ */
      #topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 0 8px;
        margin-bottom: 8px;
      }
      #brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #badge {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        box-shadow: 0 3px 12px rgba(212, 134, 15, 0.3);
      }
      #brand-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #brand-name {
        font-family: var(--f-sacred);
        font-size: 0.65rem;
        font-weight: 700;
        color: #c57514;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      #brand-sub {
        font-size: 0.5rem;
        color: #8f6b45;
      }
      #device-time {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-family: var(--f-sacred);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #9a642f;
        min-width: 180px;
        line-height: 1.3;
      }
      #topbar-right {
        display: flex;
        gap: 8px;
      }
      .icon-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 2px 8px rgba(120, 60, 0, 0.08);
        font-size: 0.9rem;
        transition: transform 0.1s;
      }
      .icon-btn:active { transform: scale(0.92); }

      /* ─ TABS ─ */
      #tabs-label {
        font-family: var(--f-sacred);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #b8690e;
        margin-bottom: 6px;
        text-align: center;
      }

      #tabs-container {
        display: flex;
        gap: 4px;
        margin-bottom: 10px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .tab {
        flex: 1;
        min-width: 100px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255, 245, 220, 0.9);
        border: 1px solid rgba(196, 130, 30, 0.2);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #8f6b45;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .tab.active {
        background: linear-gradient(140deg, var(--saffron), var(--marigold));
        color: #fff;
        box-shadow: 0 4px 12px rgba(180, 90, 14, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* ─ MANTRA DISPLAY ─ */
      #mantra-box {
        text-align: center;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 8px 10px;
        margin-bottom: 8px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), 0 3px 10px rgba(120, 60, 0, 0.08);
      }
      #mantra-title {
        font-family: var(--f-sacred);
        font-size: 0.58rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #cf7a19;
        margin-bottom: 4px;
      }
      #mantra-native {
        font-family: var(--f-deva);
        font-size: 0.72rem;
        line-height: 1.5;
        color: #5c3416;
      }
      #mantra-roman {
        margin-top: 4px;
        font-size: 0.62rem;
        line-height: 1.4;
        font-weight: 700;
        color: #7c4b21;
      }

      /* ─ SLIDESHOW AREA ─ */
      #slideshow-area {
        position: relative;
        flex: 1;
        min-height: 0;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--glass-border);
        background: rgba(40, 26, 12, 0.08);
        box-shadow: 0 6px 18px rgba(90, 40, 6, 0.14);
        margin-bottom: 10px;
      }

      /* ─ COUNTER DISPLAY ─ */
      #counter-display {
        position: relative;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0) 34%), linear-gradient(160deg, #fff7e8 0%, #f8e4bf 100%);
        border: 3px solid rgba(224, 120, 32, 0.5);
        box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.85), 0 8px 20px rgba(160, 85, 12, 0.28);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        margin: 0 auto 16px;
      }
      #count-value {
        font-family: var(--f-sacred);
        font-size: 2.4rem;
        font-weight: 900;
        color: #7c4418;
        text-shadow: 0 2px 8px rgba(224, 120, 32, 0.18);
        line-height: 1;
      }
      #count-label {
        font-size: 0.5rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #9a5f2d;
      }

      /* ─ CONTROLS ─ */
      #controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 8px;
      }

      .reset-btn {
        min-height: 44px;
        padding: 0 14px;
        border-radius: 999px;
        background: rgba(255, 245, 226, 0.94);
        border: 1px solid rgba(196, 130, 30, 0.24);
        color: #8d5524;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        box-shadow: 0 3px 10px rgba(120, 60, 0, 0.08);
        transition: transform 0.08s;
      }
      .reset-btn:active { transform: scale(0.94); }

      .plus-btn {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: radial-gradient(circle at 12% 18%, rgba(255, 255, 255, 0.55), transparent 44%), linear-gradient(150deg, #e07820 0%, #f0a830 100%);
        border: 3px solid rgba(255, 245, 220, 0.6);
        color: #fff6ea;
        font-size: 3.2rem;
        font-weight: 900;
        line-height: 1;
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.52), 0 14px 32px rgba(180, 90, 14, 0.44), 0 0 16px rgba(240, 168, 48, 0.32);
        transition: transform 0.1s, box-shadow 0.1s;
        flex-shrink: 0;
        position: relative;
        z-index: 8;
      }
      .plus-btn:active {
        transform: scale(0.86);
        box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.52), 0 8px 16px rgba(180, 90, 14, 0.32);
      }

      .minus-btn {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        background: rgba(255, 245, 226, 0.93);
        border: 1px solid rgba(196, 130, 30, 0.24);
        color: #8d5524;
        font-size: 1.8rem;
        font-weight: 700;
        box-shadow: 0 3px 10px rgba(120, 60, 0, 0.08);
        transition: transform 0.08s;
        flex-shrink: 0;
      }
      .minus-btn:active { transform: scale(0.92); }

      /* ─ STATS ─ */
      #stats {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .stat-chip {
        background: rgba(255, 245, 226, 0.94);
        border: 1px solid rgba(196, 130, 30, 0.26);
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 0.62rem;
        font-weight: 700;
        color: #8d5524;
        box-shadow: 0 2px 8px rgba(120, 60, 0, 0.07);
      }

      /* ─ BOTTOM NAV ─ */
      #bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: calc(60px + var(--sb));
        padding: 6px 0 var(--sb);
        background: var(--glass);
        border-top: 1px solid var(--glass-border);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: space-around;
        z-index: 100;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        text-decoration: none;
        color: #8f612f;
        font-size: 0.6rem;
        font-weight: 700;
        transition: color 0.2s;
      }
      .nav-item.active { color: var(--saffron); }
      .nav-icon { font-size: 1.4rem; }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <div id="watermark"></div>
    <div id="slideshow"></div>

    <div id="app">
      <!-- TOP BAR -->
      <div id="topbar">
        <div id="brand">
          <img id="badge" src="logo.jpeg" alt="Logo" />
          <div id="brand-text">
            <div id="brand-name">ISKCON NRJD</div>
            <div id="brand-sub">Japa Counter</div>
          </div>
        </div>
        <div id="device-time">00:00</div>
        <div id="topbar-right">
          <button class="icon-btn" id="btn-fs">⛶</button>
          <button class="icon-btn" id="btn-settings">⚙</button>
        </div>
      </div>

      <!-- TABS -->
      <div id="tabs-label">COUNTER MODE</div>
      <div id="tabs-container">
        <button class="tab active" data-mode="hk">Hare Krishna</button>
        <button class="tab" data-mode="nr">Ugram Veeram</button>
        <button class="tab" data-mode="dv">Dhanvantara</button>
      </div>

      <!-- MANTRA -->
      <div id="mantra-box">
        <div id="mantra-title">Mantra</div>
        <div id="mantra-native"></div>
        <div id="mantra-roman"></div>
      </div>

      <!-- COUNTER DISPLAY -->
      <div id="counter-display">
        <div id="count-value">000</div>
        <div id="count-label">BEADS</div>
      </div>

      <!-- SLIDESHOW -->
      <div id="slideshow-area">
      </div>

      <!-- CONTROLS -->
      <div id="controls">
        <button class="reset-btn" id="reset-this">↺ Reset</button>
        <button class="plus-btn" id="plus-btn">+</button>
        <button class="minus-btn" id="minus-btn">−</button>
      </div>

      <!-- STATS -->
      <div id="stats">
        <div class="stat-chip" id="rounds-chip">Rounds: 0</div>
        <div class="stat-chip" id="total-chip">Total: 0</div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div id="bottom-nav">
      <a href="index.html" class="nav-item">
        <div class="nav-icon">📿</div>
        <div>Session</div>
      </a>
      <a href="stopwatch.html" class="nav-item">
        <div class="nav-icon">⏱️</div>
        <div>Stopwatch</div>
      </a>
      <a href="counter.html" class="nav-item active">
        <div class="nav-icon">🔢</div>
        <div>Counter</div>
      </a>
    </div>

    <script>
      "use strict";

      const MODES = {
        hk: {
          name: "Hare Krishna Counter",
          folder: "NRJD_Pics",
          native: "हरे कृष्ण हरे कृष्ण कृष्ण कृष्ण हरे हरे। हरे राम हरे राम राम राम हरे हरे॥",
          roman: "Hare Krishna Hare Krishna Krishna Krishna Hare Hare | Hare Rama Hare Rama Rama Rama Hare Hare ||",
        },
        nr: {
          name: "Narasimha Counter",
          folder: "NarashimaDev_pics",
          native: "ॐ उग्रं वीरं महाविष्णुं ज्वलन्तं सर्वतोमुखम्। नृसिंहं भीषणं भद्रं मृत्युमृत्युं नमाम्यहम्॥",
          roman: "Om Ugram Veeram Maha-Vishnum Jvalantam Sarvato Mukham | Nrisimham Bheeshanam Bhadram Mrityur-Mrityum Namaamyaham ||",
        },
        dv: {
          name: "Dhanvantara Counter",
          folder: "NRJD_Pics",
          native: "ॐ धं धन्वन्तरये नमः ॐ",
          roman: "Om Dham Dhanvantarayē Namah Om",
        },
      };

      const BEADS_PER_ROUND = 108;
      const STORAGE_KEY = "japa_counter_state_v3";

      let state = loadState();
      let mode = state.lastMode || "hk";
      let slides = [];
      let slideIdx = 0;
      let slideTimer = null;

      function loadState() {
        const base = { hk: { rounds: 0, bead: 0 }, nr: { rounds: 0, bead: 0 }, dv: { rounds: 0, bead: 0 }, lastMode: "hk" };
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          return { hk: norm(saved.hk), nr: norm(saved.nr), dv: norm(saved.dv), lastMode: ["hk", "nr", "dv"].includes(saved.lastMode) ? saved.lastMode : "hk" };
        } catch { return base; }

        function norm(obj) {
          const r = Math.max(0, Number(obj?.rounds || 0));
          let b = Math.max(0, Number(obj?.bead || 0));
          if (b >= BEADS_PER_ROUND) b = b % BEADS_PER_ROUND;
          return { rounds: r, bead: b };
        }
      }

      function saveState() {
        state.lastMode = mode;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function updateDeviceTime() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const date = String(now.getDate()).padStart(2, "0");
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        document.getElementById("device-time").textContent = `${month}/${date}\n${h}:${m}`;
      }

      function render() {
        const m = MODES[mode];
        const s = state[mode];
        document.getElementById("mantra-title").textContent = m.name;
        document.getElementById("mantra-native").textContent = m.native;
        document.getElementById("mantra-roman").textContent = m.roman;
        document.getElementById("count-value").textContent = String(s.bead).padStart(3, "0");
        document.getElementById("rounds-chip").textContent = `Rounds: ${s.rounds}`;
        document.getElementById("total-chip").textContent = `Total: ${s.rounds * BEADS_PER_ROUND + s.bead}`;

        document.querySelectorAll(".tab").forEach((t, i) => {
          t.classList.toggle("active", ["hk", "nr", "dv"][i] === mode);
        });
      }

      function switchMode(m) {
        if (m !== mode && MODES[m]) {
          mode = m;
          saveState();
          loadSlides();
          render();
        }
      }

      function increment() {
        const s = state[mode];
        s.bead += 1;
        if (s.bead >= BEADS_PER_ROUND) {
          s.bead = 0;
          s.rounds += 1;
        }
        saveState();
        render();
      }

      function decrement() {
        const s = state[mode];
        if (s.bead > 0) s.bead -= 1;
        else if (s.rounds > 0) {
          s.rounds -= 1;
          s.bead = BEADS_PER_ROUND - 1;
        }
        saveState();
        render();
      }

      function resetThis() {
        state[mode] = { rounds: 0, bead: 0 };
        saveState();
        render();
      }

      async function loadSlides() {
        const ss = document.getElementById("slideshow");
        ss.innerHTML = "";
        clearInterval(slideTimer);
        slides = [];
        slideIdx = 0;

        const m = MODES[mode];
        let list = [];
        for (const u of [m.folder === "NRJD_Pics" ? "image-list.json" : "narashima-image-list.json"]) {
          try {
            const r = await fetch(u);
            if (!r.ok) continue;
            const d = await r.json();
            if (Array.isArray(d) && d.length) {
              list = d;
              break;
            }
          } catch {}
        }

        if (!list.length) {
          ss.innerHTML = `<div style="inset:0;position:absolute;display:flex;align-items:center;justify-content:center;color:#7e5226;font-size:0.8rem;">No images</div>`;
          return;
        }

        slides = list.map((f) => `/${m.folder}/${encodeURIComponent(f)}`);
        const a = document.createElement("div");
        const b = document.createElement("div");
        a.className = "slide active";
        b.className = "slide";
        a.style.backgroundImage = `url("${slides[0]}")`;
        ss.append(a, b);

        function nextSlide() {
          slideIdx = (slideIdx + 1) % slides.length;
          const sa = ss.querySelectorAll(".slide");
          sa[0].classList.remove("active");
          sa[1].classList.add("active");
          sa[1].style.backgroundImage = `url("${slides[slideIdx]}")`;
          ss.append(sa[0]);
        }

        slideTimer = setInterval(nextSlide, 2000);
      }

      function populateWatermark() {
        const wm = document.getElementById("watermark");
        const words = ["HARE KRISHNA HARE KRISHNA", "KRISHNA KRISHNA HARE HARE", "HARE RAMA HARE RAMA", "RAMA RAMA HARE HARE"];
        for (let i = 0; i < 60; i++) {
          const s = document.createElement("span");
          s.textContent = words[i % 4];
          wm.appendChild(s);
        }
      }

      // Events
      document.querySelectorAll(".tab").forEach((t) => {
        t.addEventListener("click", () => switchMode(t.dataset.mode));
      });

      document.getElementById("plus-btn").addEventListener("click", increment);
      document.getElementById("minus-btn").addEventListener("click", decrement);
      document.getElementById("reset-this").addEventListener("click", resetThis);

      // Init
      populateWatermark();
      setInterval(updateDeviceTime, 1000);
      updateDeviceTime();
      loadSlides();
      render();
    </script>
  </body>
</html>
