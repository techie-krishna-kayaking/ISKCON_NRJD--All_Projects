version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: anandbazaar-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: anandbazaar

  backend:
    build: ./backend
    container_name: anandbazaar-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/anandbazaar
      JWT_SECRET: change-this-to-a-strong-secret-in-production
      JWT_EXPIRE: 7d
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs

  frontend:
    build: ./frontend
    container_name: anandbazaar-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
  backend_logs:
