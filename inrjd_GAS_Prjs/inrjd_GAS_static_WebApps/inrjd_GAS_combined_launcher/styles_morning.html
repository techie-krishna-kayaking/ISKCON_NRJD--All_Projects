<style>

body{
  margin:0;
  padding:0;
  background:linear-gradient(180deg, #fff9f0 0%, #fff5e6 50%, #fef0d8 100%);
  color:#2e2e2e;
  font-family:'Noto Serif', serif;
  min-height:100vh;
}

.header{
  padding:18px 14px;
  text-align:center;
  background:linear-gradient(180deg, #fff7eb 0%, #ffe8c8 100%);
  border-bottom:1px solid #f0d4a8;
  box-shadow:0 2px 10px rgba(180, 120, 40, 0.1);
  position:relative;
}

.header::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  background:linear-gradient(90deg, #f5b041 0%, #e67e22 45%, #f39c12 100%);
}

.header-inner{
  max-width:1100px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}

.header-title-wrap{
  flex:1;
  min-width:0;
}

.header-eyebrow{
  font-family:'Jost', 'Noto Serif', serif;
  font-size:0.75rem;
  font-weight:600;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:#b8600a;
  margin-bottom:6px;
}

.header-logo{
  width:52px;
  height:52px;
  object-fit:contain;
  border-radius:999px;
  background:#ffffff;
  border:1px solid #f0d4a8;
  padding:4px;
  box-shadow:0 2px 8px rgba(180, 120, 40, 0.16);
  flex-shrink:0;
}

.title{
  font-family:'Cinzel', 'Noto Serif', serif;
  font-size:2.1rem;
  font-weight:700;
  letter-spacing:0.06em;
  color:#7b3f00;
}

.subtitle{
  font-family:'Jost', 'Noto Serif', serif;
  font-size:0.9375rem;
  margin-top:6px;
  color:#a06820;
}

.search-container{
  padding:16px;
  background:transparent;
}

#searchInput{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #e0c8a0;
  font-size:1rem;
  box-sizing:border-box;
  background:#fffcf7;
}

#searchInput:focus{
  outline:none;
  border-color:#e67e22;
  box-shadow:0 0 0 3px rgba(230, 126, 34, 0.15);
}

.container{
  padding:10px 14px 50px;
}

.section{
  margin-bottom:14px;
}

.accordion{
  width:100%;
  background:#ffffff;
  border:none;
  outline:none;
  padding:18px 22px;
  border-radius:14px;
  font-size:1.125rem;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(180, 120, 40, 0.1);
  border-left:4px solid #f5b041;

  display:flex;
  align-items:center;
  justify-content:flex-start;

  position:relative;
  line-height:1.4;
  color:#5a3000;
  transition:all 0.2s ease;
}

.accordion:hover{
  box-shadow:0 4px 12px rgba(180, 120, 40, 0.18);
  transform:translateY(-1px);
}

.accordion:after{
  content:'+';
  position:absolute;
  right:20px;
  font-size:1.375rem;
  color:#e67e22;
}

.active:after{
  content:'−';
}

.panel{
  display:none;
  padding:18px;
  background:#fffcf7;
  border-radius:14px;
  margin-top:8px;
  line-height:2;
  font-size:1.25rem;
  border:1px solid #f5e6cc;
}

.verse{
  margin-bottom:26px;
}

.verse-title{
  font-size:1.375rem;
  font-weight:700;
  margin-bottom:18px;
  color:#8b3a00;
}

.translation{
  font-style:italic;
  color:#6b4c1e;
  margin-top:8px;
  font-size:1.1rem;
}

.schedule-item{
  padding:8px 0;
  border-bottom:1px dashed #f0d4a8;
}

.schedule-time{
  font-weight:700;
  color:#c0680a;
}

@media screen and (max-width:600px){

  .header{
    padding:14px 10px;
  }

  .header-inner{
    gap:8px;
  }

  .header-logo{
    width:40px;
    height:40px;
    padding:3px;
  }

  .header-eyebrow{
    font-size:0.62rem;
    letter-spacing:0.14em;
    margin-bottom:4px;
  }

  .title{
    font-size:1.3rem;
    letter-spacing:0.04em;
  }

  .subtitle{
    font-size:0.78rem;
  }

  .accordion{
    font-size:1.0625rem;
  }

  .panel{
    font-size:1.125rem;
  }

}

.controls-bar{
  position:fixed;
  bottom:calc(16px + env(safe-area-inset-bottom));
  right:16px;
  z-index:9999;
  background:#ffffff;
  border:2px solid #f0d4a8;
  border-radius:12px;
  padding:10px 14px;
  box-shadow:0 4px 12px rgba(180, 120, 40, 0.15);
}

.font-size-controls{
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:center;
}

.font-size-controls button{
  width:38px;
  height:38px;
  border:2px solid #e0c8a0;
  border-radius:8px;
  background:#ffffff;
  color:#7b3f00;
  font-weight:700;
  font-size:1.125rem;
  cursor:pointer;
  transition:all 0.2s ease;
  font-family:'Noto Serif', serif;
  display:flex;
  align-items:center;
  justify-content:center;
}

.font-size-controls button:hover{
  border-color:#e67e22;
  background:#fff3e6;
  box-shadow:0 2px 6px rgba(230, 126, 34, 0.15);
}

.font-size-controls button:active{
  transform:scale(0.95);
}

.font-size-label{
  font-size:0.75rem;
  color:#777;
  font-weight:600;
  margin:0 8px;
}

</style>
