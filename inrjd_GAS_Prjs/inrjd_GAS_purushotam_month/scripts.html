<script>

// Initialize font size from localStorage
let currentFontSize = parseInt(localStorage.getItem('fontSizePercent')) || 100;
applyFontSize();

const accordions = document.getElementsByClassName("accordion");

for(let i = 0; i < accordions.length; i++){

  accordions[i].addEventListener("click", function(){

    this.classList.toggle("active");

    const panel = this.nextElementSibling;

    if(panel.style.display === "block"){
      panel.style.display = "none";
    }else{
      panel.style.display = "block";
    }

  });

}

function searchSections(){

  const input = document.getElementById('searchInput');
  const filter = input.value.toLowerCase();

  const sections = document.getElementsByClassName('section');

  for(let i = 0; i < sections.length; i++){

    const text = sections[i].innerText.toLowerCase();

    if(text.includes(filter)){
      sections[i].style.display = "";
    }else{
      sections[i].style.display = "none";
    }

  }

}

function changeLanguage(lang){

  var url = SCRIPT_URL + '?lang=' + lang;
  window.open(url, '_top');

}

function increaseFontSize(){
  if(currentFontSize < 150){
    currentFontSize += 10;
    applyFontSize();
  }
}

function decreaseFontSize(){
  if(currentFontSize > 70){
    currentFontSize -= 10;
    applyFontSize();
  }
}

function applyFontSize(){
  const scale = currentFontSize / 100;
  const root = document.documentElement;
  root.style.fontSize = (16 * scale) + 'px';
  document.getElementById('fontSizeLabel').textContent = currentFontSize + '%';
  localStorage.setItem('fontSizePercent', currentFontSize);
}

</script>
