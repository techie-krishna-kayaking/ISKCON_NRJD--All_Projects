<script>

// ─── TAB SWITCHING ──────────────────────────────────────────────────────────
function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  document.querySelectorAll('.tab-content').forEach(function(tab) {
    tab.classList.remove('active');
  });

  event.target.classList.add('active');
  document.getElementById('tab-' + tabName).classList.add('active');
}

// ─── GLOBAL DATA STORE ──────────────────────────────────────────────────────
var allSchoolData = [];

// ─── LOAD DATA ──────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  loadSchoolData();
});

function loadSchoolData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('school-list').innerHTML = '';

  google.script.run
    .withSuccessHandler(function(data) {
      allSchoolData = data || [];
      renderSchools(allSchoolData);
    })
    .withFailureHandler(function(err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('school-list').innerHTML =
        '<p style="text-align:center;color:red;">❌ Error loading data: ' + err.message + '</p>';
    })
    .getSchoolData();
}

// ─── SEARCH / FILTER ────────────────────────────────────────────────────────
function filterSchools() {
  var query = document.getElementById('searchInput').value.toLowerCase();
  if (!query) {
    renderSchools(allSchoolData);
    return;
  }
  var filtered = allSchoolData.filter(function(s) {
    return (s.school && s.school.toLowerCase().indexOf(query) !== -1) ||
           (s.contactName && s.contactName.toLowerCase().indexOf(query) !== -1);
  });
  renderSchools(filtered);
}

// ─── RENDER TABLE ───────────────────────────────────────────────────────────
function renderSchools(data) {
  document.getElementById('loading').style.display = 'none';
  var container = document.getElementById('school-list');

  if (!data || data.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:#888;">No school records found.</p>';
    return;
  }

  var html = '<div class="table-wrap"><table class="school-table">';
  html += '<thead><tr>';
  html += '<th>#</th>';
  html += '<th>🏫 School</th>';
  html += '<th>👤 Contact</th>';
  html += '<th>📞</th>';
  html += '<th>📍</th>';
  html += '<th>📅 Initial Visit</th>';
  html += '<th>💬 Comments</th>';
  html += '<th>📅 Prelims</th>';
  html += '<th>🙋 Volunteers</th>';
  html += '<th>💾</th>';
  html += '</tr></thead>';
  html += '<tbody>';

  data.forEach(function(s) {
    html += buildTableRow(s);
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function buildTableRow(s) {
  var phoneLink = s.contactNumber ? 'tel:+91' + s.contactNumber.replace(/\D/g, '') : '#';
  var mapsLink = s.location || '';

  var row = '<tr id="row-' + s.rowIndex + '">';

  // S.No.
  row += '<td class="td-sno"><span class="sno-badge">' + escapeHtml(String(s.sno)) + '</span></td>';

  // School name
  row += '<td class="td-school">' + escapeHtml(s.school) + '</td>';

  // Contact
  row += '<td class="td-contact">' + escapeHtml(s.contactName) + '</td>';

  // Phone - call button
  row += '<td class="td-action"><a class="btn-call" href="' + phoneLink + '" title="Call">📞</a></td>';

  // Location
  if (mapsLink) {
    row += '<td class="td-action"><a class="btn-location" href="' + escapeHtml(mapsLink) + '" target="_blank" title="Get Directions">🗺️</a></td>';
  } else {
    row += '<td class="td-action">—</td>';
  }

  // Initial Visit Date (editable)
  row += '<td><input type="date" class="tbl-input" id="visit-' + s.rowIndex + '" value="' + escapeHtml(s.initialVisitDate) + '"></td>';

  // Comments (editable)
  row += '<td><input type="text" class="tbl-input tbl-input-wide" id="comments-' + s.rowIndex + '" value="' + escapeHtml(s.comments) + '" placeholder="Add comment..."></td>';

  // Prelims Date (editable)
  row += '<td><input type="date" class="tbl-input" id="prelims-' + s.rowIndex + '" value="' + escapeHtml(s.prelimsDate) + '"></td>';

  // Volunteers (editable)
  row += '<td><input type="text" class="tbl-input" id="volunteers-' + s.rowIndex + '" value="' + escapeHtml(s.volunteers) + '" placeholder="Names..."></td>';

  // Save button
  row += '<td class="td-action"><button class="btn-save-sm" onclick="saveRecord(' + s.rowIndex + ')" id="btn-' + s.rowIndex + '" title="Save">💾</button></td>';

  row += '</tr>';
  return row;
}

// ─── DEVICE INFO ────────────────────────────────────────────────────────────
function getBrowserInfo() {
  var ua = navigator.userAgent;
  var browser = 'Unknown';
  var version = '';

  if (/Edg\//.test(ua)) {
    browser = 'Edge';
    version = ua.match(/Edg\/(\d+\.\d+)/)?.[1] || '';
  } else if (/OPR\/|Opera/.test(ua)) {
    browser = 'Opera';
    version = ua.match(/OPR\/(\d+\.\d+)/)?.[1] || '';
  } else if (/Chrome\//.test(ua) && !/Chromium/.test(ua)) {
    browser = 'Chrome';
    version = ua.match(/Chrome\/(\d+\.\d+)/)?.[1] || '';
  } else if (/Safari\//.test(ua) && !/Chrome/.test(ua)) {
    browser = 'Safari';
    version = ua.match(/Version\/(\d+\.\d+)/)?.[1] || '';
  } else if (/Firefox\//.test(ua)) {
    browser = 'Firefox';
    version = ua.match(/Firefox\/(\d+\.\d+)/)?.[1] || '';
  }

  return browser + (version ? ' v' + version : '');
}

function getDeviceInfo() {
  var ua = navigator.userAgent;
  var device = 'Unknown';

  if (/iPhone/.test(ua)) device = 'Apple iPhone';
  else if (/iPad/.test(ua)) device = 'Apple iPad';
  else if (/Macintosh/.test(ua)) device = 'Apple Mac';
  else if (/Samsung/.test(ua)) device = 'Samsung';
  else if (/Pixel/.test(ua)) device = 'Google Pixel';
  else if (/OnePlus/.test(ua)) device = 'OnePlus';
  else if (/Xiaomi|Redmi|POCO/.test(ua)) device = 'Xiaomi';
  else if (/OPPO/.test(ua)) device = 'OPPO';
  else if (/vivo/.test(ua)) device = 'Vivo';
  else if (/realme/.test(ua)) device = 'Realme';
  else if (/Windows/.test(ua)) device = 'Windows PC';
  else if (/Linux/.test(ua)) device = 'Linux';
  else if (/Android/.test(ua)) device = 'Android';

  // Try to extract model
  var modelMatch = ua.match(/\(.*?;\s*([^;)]+)\s*Build/);
  if (modelMatch) device += ' - ' + modelMatch[1].trim();

  return device;
}

var clientIP = '';
(function fetchIP() {
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://api.ipify.org?format=json', true);
    xhr.onload = function() {
      if (xhr.status === 200) {
        var resp = JSON.parse(xhr.responseText);
        clientIP = resp.ip || '';
      }
    };
    xhr.send();
  } catch(e) { clientIP = ''; }
})();

// ─── SAVE RECORD ────────────────────────────────────────────────────────────
function saveRecord(rowIndex) {
  var btn = document.getElementById('btn-' + rowIndex);
  btn.disabled = true;
  btn.textContent = '⏳';

  var updates = {
    initialVisitDate: document.getElementById('visit-' + rowIndex).value,
    comments: document.getElementById('comments-' + rowIndex).value,
    prelimsDate: document.getElementById('prelims-' + rowIndex).value,
    volunteers: document.getElementById('volunteers-' + rowIndex).value,
    ipAddress: clientIP,
    browserInfo: getBrowserInfo(),
    deviceInfo: getDeviceInfo()
  };

  google.script.run
    .withSuccessHandler(function() {
      btn.disabled = false;
      btn.textContent = '💾';
      showToast('✅ Saved successfully!');
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = '💾';
      showToast('❌ Error: ' + err.message);
    })
    .updateSchoolRecord(rowIndex, updates);
}

// ─── TOAST ──────────────────────────────────────────────────────────────────
function showToast(message) {
  var toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(function() {
    toast.classList.remove('show');
  }, 3000);
}

// ─── UTILITY ────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

</script>
